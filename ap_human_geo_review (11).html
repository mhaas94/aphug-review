{topic:'6.4 The Size and Distribution of Cities',term:'Gravity Model',def:'A geographic model predicting that spatial interaction between two places is proportional to the product of their populations and inversely proportional to the distance between them.'},
{topic:'6.11 Challenges of Urban Sustainability',term:'Greenbelts',def:'Zones of protected open land surrounding cities where development is restricted to prevent sprawl, preserve farmland, and provide green space. Example: London\'s Metropolitan Green Belt.'},
{topic:'6.6 Density and Land Use',term:'Housing density',def:'The number of housing units per unit of land area; high density characterizes urban cores while low density characterizes suburbs.'},
{topic:'6.11 Challenges of Urban Sustainability',term:'Infilling',def:'The development of vacant or underused land within an existing urban area, as an alternative to expanding the urban footprint onto surrounding greenfields or farmland.'},
{topic:'6.11 Challenges of Urban Sustainability',term:'Informal settlement',def:'Densely populated urban area with substandard housing and no legal land tenure. Also called favelas, barrios, shantytowns.'},
{topic:'6.5 The Internal Structure of Cities',term:'Latin American city model',def:'Griffin-Ford model: CBD with a commercial spine, elite housing along the spine, squatter settlements on the periphery.'},
{topic:'6.2 Cities Across the World',term:'Megacity',def:'A metropolitan area with a population exceeding 10 million. Examples: Tokyo, Delhi, Mexico City, São Paulo.'},
{topic:'6.2 Cities Across the World',term:'Metacities',def:'Urban agglomerations with populations exceeding 20 million people; the largest human settlements on Earth. Examples: Tokyo, Delhi, Shanghai.'},
{topic:'6.6 Density and Land Use',term:'Mixed land use',def:'The combination of residential, commercial, retail, and recreational activities within the same neighborhood or building; reduces car dependence and increases walkability.'},
{topic:'6.5 The Internal Structure of Cities',term:'Multiple nuclei model',def:'Harris and Ullman (1945): cities develop around multiple activity centers, not just one CBD.'},
{topic:'6.9 Urban Data',term:'Narratives',def:'Qualitative accounts including stories, testimonies, and community histories used in human geography to understand how people experience and attach meaning to urban places.'},
{topic:'6.7 Infrastructure',term:'Neighborhood government',def:'The most local level of urban governance, including neighborhood associations, community boards, and block councils representing residents in local planning decisions.'},
{topic:'6.11 Challenges of Urban Sustainability',term:'New Urbanism',def:'Planning movement favoring walkable, mixed-use neighborhoods to reduce car dependence and build community.'},
{topic:'6.5 The Internal Structure of Cities',term:'Periphery (urban)',def:'The outer, lower-density areas of a city characterized by newer development, greater car dependence, and less access to urban services compared to the city core.'},
{topic:'6.4 The Size and Distribution of Cities',term:'Primate city',def:'The largest city in a country, disproportionately larger than all others, dominating economic, political, and cultural life.'},
{topic:'6.9 Urban Data',term:'Qualitative data',def:'Non-numerical geographic information such as interviews, photographs, and field observations that captures the experiential and social dimensions of place.'},
{topic:'6.9 Urban Data',term:'Quantitative data',def:'Numerical geographic information such as census statistics, GPS coordinates, and economic indicators used to measure and analyze urban patterns.'},
{topic:'6.4 The Size and Distribution of Cities',term:'Range',def:'The maximum distance people will travel to obtain a service.'},
{topic:'6.4 The Size and Distribution of Cities',term:'Rank-size rule',def:'In a regular urban hierarchy, the second city is half the size of the largest, the third is one-third, and so on.'},
{topic:'6.10 Challenges of Urban Changes',term:'Redlining',def:'The now-illegal practice of denying financial services to residents of certain areas based on race.'},
{topic:'6.7 Infrastructure',term:'Sanitation',def:'Systems for managing human waste and maintaining clean water supplies; a fundamental infrastructure challenge in rapidly urbanizing developing-world cities.'},
{topic:'6.5 The Internal Structure of Cities',term:'Sector model',def:'Hoyt (1939): land uses extend from the CBD in wedge-shaped sectors along transportation corridors.'},
{topic:'6.10 Challenges of Urban Changes',term:'Slow-growth cities',def:'Cities experiencing population stagnation or decline due to deindustrialization or out-migration; face abandoned buildings, shrinking tax base, and deteriorating infrastructure. Example: Detroit.'},
{topic:'6.11 Challenges of Urban Sustainability',term:'Smart growth',def:'Urban planning promoting compact, walkable, transit-oriented development to reduce sprawl and environmental impact.'},
{topic:'6.5 The Internal Structure of Cities',term:'Southeast Asian City Model',def:'A model of urban structure featuring a port zone at the center, surrounded by commercial districts and ethnic enclaves, with squatter settlements on the urban fringe.'},
{topic:'6.6 Density and Land Use',term:'Sprawl',def:'The low-density, unplanned, auto-dependent spread of urban development onto surrounding rural and agricultural land.'},
{topic:'6.7 Infrastructure',term:'State government',def:'The level of governance between federal and local in the US, providing funding and regulation for education, transportation, healthcare, and land use planning.'},
{topic:'6.6 Density and Land Use',term:'Suburban sprawl',def:'Low-density, auto-dependent expansion of urban areas into surrounding rural land.'},
{topic:'6.1 The Origin and Influences of Urbanization',term:'Suburbanization',def:'The movement of population and economic activity from central cities to surrounding suburbs, driven by automobiles, highway investment, and preferences for more space.'},
{topic:'6.9 Urban Data',term:'Survey data',def:'Quantitative data collected through structured questionnaires; used by urban planners to measure housing conditions, commuting patterns, and residents\' needs.'},
{topic:'6.11 Challenges of Urban Sustainability',term:'Sustainable design initiatives',def:'Architectural and planning approaches minimizing environmental impact through energy efficiency, renewable materials, green roofs, and reduced waste generation.'},
{topic:'6.4 The Size and Distribution of Cities',term:'Threshold',def:'The minimum population needed to support a service or business.'},
{topic:'6.11 Challenges of Urban Sustainability',term:'Transportation-oriented development',def:'Urban planning concentrating high-density housing, offices, and retail near public transit stations to reduce car dependence and promote walkability.'},
{topic:'6.11 Challenges of Urban Sustainability',term:'Urban farming',def:'The cultivation of food within city limits including rooftop gardens, community gardens, and vertical farms, contributing to food security and urban sustainability.'},
{topic:'6.11 Challenges of Urban Sustainability',term:'Urban growth boundaries',def:'Legal lines drawn around a city beyond which urban development is prohibited; designed to contain sprawl and protect agricultural land. Example: Portland, Oregon.'},
{topic:'6.11 Challenges of Urban Sustainability',term:'Urban heat island',def:'Urban areas are significantly warmer than surrounding rural areas due to pavement, buildings, and human activity.'},
{topic:'6.4 The Size and Distribution of Cities',term:'Urban hierarchy',def:'The ranking of cities by population size and economic function, from small market towns at the base to world cities at the apex; explained by central place theory.'},
{topic:'6.10 Challenges of Urban Changes',term:'Urban renewal',def:'Government-led programs to redevelop deteriorating urban neighborhoods, often by clearing older buildings; historically displaced low-income and minority communities.'},
{topic:'6.8 Urban Sustainability',term:'Urban sustainability',def:'The goal of developing cities that meet residents\' needs without depleting resources future generations will need; addressed through smart growth, green infrastructure, and equitable planning.'},
{topic:'6.1 The Origin and Influences of Urbanization',term:'Urbanization',def:'The process by which an increasing share of a population lives in cities, driven by rural-to-urban migration and natural increase.'},
{topic:'6.11 Challenges of Urban Sustainability',term:'Walkability',def:'The degree to which a neighborhood facilitates safe, convenient pedestrian movement with sidewalks, mixed uses, and destinations within walking distance.'},
{topic:'6.8 Urban Sustainability',term:'Water quality',def:'The chemical, physical, and biological condition of water; industrial discharge, agricultural runoff, and aging infrastructure are major threats to urban water supplies.'},
{topic:'6.3 Cities and Globalization',term:'World cities',def:'Cities functioning as major nodes in the global economic network controlling significant shares of global finance, trade, media, and culture. Examples: New York, London, Tokyo.'},
{topic:'6.3 Cities and Globalization',term:'World city (Global city)',def:'A city that serves as a major node in the global economic network. Examples: New York, London, Tokyo.'},
{topic:'6.7 Infrastructure',term:'Zoning',def:'Government regulation separating land into designated uses — residential, commercial, industrial.'}
],
mcqs:[
{topic:'6.5',diff:'medium',stem:'High-income residential areas extend along a major highway from downtown while industry clusters along a rail corridor. This best fits:',options:['Concentric zone model','Multiple nuclei model','Sector model','Galactic city model'],answer:2,exp:'The sector model (Hoyt) explains land use as wedge-shaped sectors radiating from the CBD along transportation lines.'},
{topic:'6.2',diff:'medium',stem:'Bangkok dominates Thailand\'s economy, government, and culture, with the second-largest city dramatically smaller. Bangkok is a classic example of:',options:['A rank-size city','A world city','A primate city','An edge city'],answer:2,exp:'A primate city is disproportionately large and dominant compared to all other cities. Bangkok is one of the world\'s clearest examples of urban primacy.'},
{topic:'6.6',diff:'medium',stem:'Which is a likely consequence of gentrification?',options:['Decline in property values and tax revenue','Displacement of lower-income residents who can no longer afford rents','Decreased density and population loss','Deindustrialization of the area'],answer:1,exp:'Gentrification raises property values and rents. While it may improve infrastructure, it typically displaces existing lower-income and minority residents.'},
{topic:'6.8',diff:'medium',stem:'A city builds light rail, rezones for mixed land use, and encourages walkable neighborhoods near transit stops. This reflects:',options:['Suburban sprawl promotion','Edge city development','Smart growth principles','Blockbusting'],answer:2,exp:'Smart growth includes transit-oriented development, mixed land uses, and compact design — reducing car dependence, sprawl, and environmental impact.'},
{topic:'6.5',diff:'medium',stem:'Favelas in Rio de Janeiro, built on steep hillsides far from the CBD, best fit which urban model?',options:['Concentric zone model','Sector model','Latin American city model','Multiple nuclei model'],answer:2,exp:'The Latin American city (Griffin-Ford) model places squatter settlements on the urban periphery — in contrast to North American models where poorer residents are often closer to the CBD.'},
{topic:'6.4',diff:'medium',stem:'A small town offers groceries and gas stations; a nearby large city also offers hospitals, universities, and professional sports. This difference is explained by:',options:['The rank-size rule','Central place theory (threshold and range)','The sector model','Urban heat island effects'],answer:1,exp:'Central place theory explains why different-sized cities offer different services. High-order services require large thresholds and wide ranges — so they concentrate in larger cities.'},
{topic:'6.10',diff:'medium',stem:'Banks historically refused to offer mortgages in certain urban neighborhoods based on racial composition. This practice is called:',options:['Blockbusting','Zoning','Redlining','Gerrymandering'],answer:2,exp:'Redlining denied financial services to residents of racially identified neighborhoods, preventing wealth-building through homeownership and deepening racial segregation.'},
{topic:'6.6',diff:'medium',stem:'Large retail and office complexes built along interstate beltways outside traditional city centers, accessible mainly by car, are best described as:',options:['Central Business Districts','New Urbanist developments','Edge cities','Megacities'],answer:2,exp:'Edge cities are nodes of commercial, retail, and office activity located outside traditional urban cores — characteristic of post-WWII American suburban development.'},
{topic:'6.1',diff:'medium',stem:'Which best describes urbanization?',options:['Conversion of agricultural land to industrial use','An increasing proportion of a country\'s population living in cities','Decline of urban populations due to suburbanization','Construction of infrastructure in rural areas'],answer:1,exp:'Urbanization refers to the shift in population distribution from rural to urban areas — an increasing proportion (not just number) living in cities.'},
{topic:'6.8',diff:'medium',stem:'Which planning concept emphasizes walkable, mixed-use neighborhoods to reduce automobile dependence?',options:['Smart growth / New Urbanism','Suburban sprawl','Galactic city model','Redlining'],answer:0,exp:'New Urbanism / Smart growth emphasizes walkable neighborhoods, mixed uses, and transit access to build community and reduce car dependence.'},
{topic:'6.5',diff:'hard',stem:'Chicago in 1925 developed in concentric zones; Los Angeles in 2000 developed with multiple disconnected nodes, beltway edge cities, and no dominant traditional downtown. Which combination of models best explains this contrast, and what geographic force explains the difference?',options:['Both cities fit the concentric zone model — all American cities develop the same way','Chicago fits the concentric zone model (pre-automobile, pedestrian/streetcar city); LA fits the galactic/peripheral city model (automobile-dependent, multiple nodes) — the key force is the automobile and freeway system','Chicago fits the sector model; LA fits the concentric zone model','The multiple nuclei model explains Chicago; the Latin American model explains LA'],answer:1,exp:'Urban models are historically and technologically contingent. Chicago\'s 1920s structure reflected pedestrian/streetcar-era development radiating from a single CBD. LA\'s 20th-century development was shaped by the automobile and freeway system, allowing low-density sprawl and multiple independent nodes. The automobile is the key geographic force explaining the shift from concentric/sector to galactic/peripheral patterns.'},
{topic:'6.3',diff:'hard',stem:'New York, London, and Tokyo are classified as "Alpha+" world cities. What specifically makes a city a world city, and why do these three dominate?',options:['They are the largest cities by population — population size determines world city status','They serve as control points for the global economy through concentrations of financial services, corporate headquarters, and advanced producer services — not population size but economic command functions determine world city status','They are the capital cities of the largest economies','They were the first cities to industrialize, giving them permanent world city status'],answer:1,exp:'World city status is determined by command-and-control functions in the global economy: major stock exchanges, headquarters of transnational corporations, law firms, accounting firms, and global media. New York, London, and Tokyo dominate because they host the deepest concentrations of these functions. Population alone doesn\'t make a world city.'},
{topic:'6.10',diff:'hard',stem:'Redlining in U.S. cities occurred in the 1930s–1960s. Today, those same neighborhoods often still have lower property values, fewer bank branches, and lower investment. Which geographic concept explains how a historical policy continues to shape present-day urban patterns?',options:['Gentrification has reversed all redlining effects','Path dependence — the spatial patterns and wealth gaps created by redlining became self-reinforcing; disinvestment led to decline, which justified further disinvestment, creating durable inequalities that persist long after the policy ended','Urban heat islands concentrated pollution in redlined neighborhoods, deterring investment','The concentric zone model predicts that inner-city areas will always remain low-income'],answer:1,exp:'Path dependence in urban geography means that historical decisions create durable spatial patterns that persist even after the original cause is removed. Redlining denied wealth-building opportunities to Black communities; this created concentrated poverty; concentrated poverty reduced property values and public services; reduced services justified continued disinvestment. The geographic legacy of redlining is measurable in property value maps today.'},
{topic:'6.6',diff:'hard',stem:'A study finds that as poorest residents are displaced from gentrifying inner-city neighborhoods, they move to inner-ring suburbs that then experience rising poverty and school disinvestment. What does this pattern reveal about gentrification?',options:['Gentrification eliminates poverty by improving neighborhoods','Gentrification does not displace people — they choose to move','Gentrification often displaces poverty rather than eliminating it, shifting concentrated disadvantage to new locations rather than addressing root causes','Inner-ring suburbs are inherently more affluent than inner cities'],answer:2,exp:'Gentrification can be a geographic displacement of poverty rather than a solution to it. When low-income residents are pushed to inner-ring suburbs, those areas face the same cycle of disinvestment — but without the urban services and transit that made inner cities at least accessible. The geography of poverty changes; the poverty itself does not.'},
{topic:'6.11',diff:'hard',stem:'Informal settlements in developing world megacities are often built on the most hazardous urban land — steep slopes, floodplains, near industrial zones. What does this spatial pattern reveal?',options:['Informal settlers prefer hazardous locations for the views','Informal settlers rationally occupy land no one else wants — because they lack legal title and economic power, they are left with the most dangerous and least desirable urban land','Hazardous land is deliberately provided by city governments for low-income housing','Informal settlements develop where land costs are highest'],answer:1,exp:'The spatial pattern of informal settlements reveals how economic and political power shapes urban geography. Without land titles, credit, or political voice, informal settlers cannot compete for desirable land — they occupy what is available: slopes too steep for formal development, floodplains, land near industrial polluters. This creates a direct spatial relationship between poverty and environmental risk.'},
{topic:'6.4',diff:'hard',stem:'Gas stations appear every few miles while hospitals appear only in large cities. Applying central place theory, which statement best explains this pattern?',options:['Gas stations are more important than hospitals to urban economies','Gas stations have a low threshold and a short range; hospitals have a high threshold and a long range — so hospitals are high-order central places serving large areas while gas stations are low-order ones serving small areas','Hospitals are located in city centers; gas stations avoid city centers','The rank-size rule determines where both services locate'],answer:1,exp:'Central place theory classifies services by threshold (minimum population to be viable) and range (maximum travel distance). Gas stations are low-order: low threshold, short range. Hospitals are high-order: large threshold, long range. This is the core logic behind the urban hierarchy.'},
{topic:'6.8',diff:'hard',stem:'Singapore requires green roofs, uses road pricing to manage congestion, and has strict mixed-use zoning. Copenhagen requires all new buildings to be carbon-neutral. Which geographic concept do these examples collectively illustrate?',options:['Suburban sprawl — both cities are expanding into surrounding areas','Smart growth and urban sustainability — using planning, pricing, and design to create more livable, environmentally resilient cities','The galactic city model — both cities are developing edge cities','New Urbanist principles applied only in European and Asian cities'],answer:1,exp:'Singapore and Copenhagen are leading examples of smart growth and urban sustainability in practice. They illustrate that urban sustainability requires multiple simultaneous strategies: land use policy, transportation demand management, green infrastructure, and transit investment. No single intervention is sufficient — sustainable cities require integrated geographic planning.'},
{topic:'6.3',diff:'hard',stem:'As global cities become more economically integrated with the world economy, they often simultaneously become more economically unequal internally. Which geographic dynamic explains this pattern?',options:['World cities attract only high-income residents, creating internal equality','Global economic integration creates demand for both high-wage financial and professional workers AND low-wage service workers who support them — generating a "dual city" of extreme wealth alongside persistent poverty','Global cities export their low-wage jobs to peripheral nations, eliminating poverty within the city','The rank-size rule predicts that the largest cities will always have the highest inequality'],answer:1,exp:'Sassen\'s "global city" thesis predicts this dual structure: global cities generate enormous demand for high-wage knowledge workers (finance, law, tech) AND for low-wage service workers. This creates sharp income polarization — Manhattan has some of the highest incomes and some of the highest poverty rates in the US simultaneously.'},
{topic:'6.1',diff:'hard',stem:'In the early 2000s, for the first time, more than half of the world\'s population lived in urban areas. Yet Europe is 75–80% urban while sub-Saharan Africa is 40% urban. What does this global pattern suggest?',options:['Sub-Saharan Africa is urbanizing too slowly and needs to accelerate','Urbanization is correlated with but not identical to economic development — Europe urbanized through industrialization, while sub-Saharan Africa is urbanizing rapidly through rural poverty, producing "urbanization without growth" in some cases','Sub-Saharan Africa\'s low urbanization rate means it has more agricultural land available','The rank-size rule explains why sub-Saharan African cities are smaller'],answer:1,exp:'Developed-world urbanization was historically driven by industrialization pulling people to cities for manufacturing jobs. Sub-Saharan African urbanization is often driven more by rural push (poverty, drought, conflict) than urban pull (formal employment) — a pattern called "urbanization without growth." Cities grow without the economic base to absorb migrants into formal employment.'},{topic:'6.9',diff:'medium',stem:'A city planner wants to understand patterns of social inequality across urban neighborhoods. Which combination of data sources would provide the most comprehensive picture?',options:['Only census population counts, because population size is the most important urban variable','Satellite imagery alone, because it shows the physical layout of all neighborhoods equally','A combination of census income data, housing vacancy rates, school performance data by district, and field observation — because no single quantitative source captures all dimensions of urban inequality','Real estate sales prices only, because property values summarize all aspects of neighborhood quality'],answer:2,exp:'Urban inequality is multidimensional and no single data source can fully capture it. Census income data reveals wealth distribution; vacancy rates indicate disinvestment; school performance data reflects service inequality; field observation captures conditions that quantitative data misses (building conditions, street life, environmental hazards). This tests CED Topic 6.9 (IMP-6.D): geographers use multiple data types to interpret urban conditions because each source has limitations that others can compensate for.'},
],
frqs:[
{type:'No Stimulus FRQ',prompt:'Urban geographers use multiple models to explain the internal structure of cities.\n\nA. Describe the concentric zone model of urban structure.\nB. Identify ONE limitation of the concentric zone model when applied to cities outside the United States.\nC. Explain how the Latin American city model differs from the concentric zone model in the location of low-income housing.',guide:[{pts:2,text:'A. Concentric zone model (Burgess): cities grow outward from the CBD in concentric rings — CBD → transition zone (factories, low-income housing) → working-class residential → middle-class residential → commuter zone. Based on Chicago in the 1920s.'},{pts:1,text:'B. Limitation: developed based on Chicago, a 20th-century North American industrial city. Does not account for European walled cities, Latin American cities where wealthy residents live near the CBD, or Asian and African cities that developed under different economic and colonial systems.'},{pts:2,text:'C. Concentric zone: low-income residents live closest to the CBD (transition zone). Latin American model: low-income squatter settlements (barrios/favelas) are on the urban periphery — far from the CBD — while wealthier residents live along a commercial spine near the center. The locations of rich and poor are essentially reversed.'}]},
{type:'1-Stimulus FRQ',prompt:'Gentrification has transformed many urban neighborhoods across the United States and globally.\n\nA. Define gentrification.\nB. Explain ONE economic benefit of gentrification for a city government.\nC. Explain ONE negative social consequence of gentrification for existing residents.',guide:[{pts:1,text:'A. Gentrification: the process by which wealthier, often younger residents move into a previously low-income urban neighborhood, renovating housing and attracting new businesses, raising property values.'},{pts:1,text:'B. Economic benefit: increased property values generate higher property tax revenue for city government, which can fund schools, infrastructure, and services. Also attracts retail and commercial investment.'},{pts:2,text:'C. Negative consequence: displacement of low-income and minority residents who cannot afford rising rents and property taxes. Long-term community members lose access to affordable housing, are pushed to more distant suburbs, and lose social networks and community institutions.'}]},
]},

{id:7,weight:'12–17%',title:'Industrial & Economic Development',desc:'Industrial Revolution, economic sectors, measures of development, theories of development, trade, sustainable development',color:'#3C3489',bg:'#EEEDFE',
concepts:[
{topic:'7.1 The Industrial Revolution',term:'Agglomeration',def:'The clustering of related industries in one location to share infrastructure, labor pools, and supplier networks, reducing per-unit costs through proximity. Example: Silicon Valley, Detroit auto industry.'},
{topic:'7.1 The Industrial Revolution',term:'Alfred Weber\'s Least Cost Theory',def:'A model of industrial location predicting factories will locate where total production and transportation costs are minimized, balancing raw material and finished goods transportation costs.'},
{topic:'7.6 Trade and the World Economy',term:'Break-of-bulk points',def:'Locations where cargo transfers from one transportation mode to another, such as ports; often develop into major industrial and commercial centers.'},
{topic:'7.5 Theories of Development',term:'Commodity dependence',def:'The situation where a country\'s exports depend heavily on a few primary commodities; price volatility traps many periphery nations in cycles of boom and bust.'},
{topic:'7.6 Trade and the World Economy',term:'Comparative advantage',def:'A country\'s ability to produce a good at lower opportunity cost than others — the basis of international trade specialization.'},
{topic:'7.6 Trade and the World Economy',term:'Complementary advantage',def:'The concept that trade partners benefit when each specializes in goods the other cannot easily produce, creating mutual gains from exchange.'},
{topic:'7.5 Theories of Development',term:'Core countries',def:'In world-systems theory, wealthy technologically advanced nations dominating the global economy through high-value manufacturing, financial services, and control of global institutions.'},
{topic:'7.5 Theories of Development',term:'Debt crisis',def:'A situation in which a developing nation cannot service its foreign debt; the 1980s debt crisis forced many nations to accept IMF structural adjustment programs imposing austerity measures.'},
{topic:'7.7 Changes as a Result of the World Economy',term:'Deindustrialization',def:'Decline of industrial activity in a region as manufacturing moves to lower-wage areas.'},
{topic:'7.5 Theories of Development',term:'Dependency theory',def:'Less-developed countries remain poor because wealthy core nations exploit them through unequal trade and resource extraction.'},
{topic:'7.1 The Industrial Revolution',term:'Economies of scale',def:'The cost advantages arising as production volume increases: as output grows, cost per unit falls; a fundamental rationale for large-scale industrial production and global supply chain organization.'},
{topic:'7.8 Sustainable Development',term:'Ecotourism',def:'Responsible travel to natural areas that conserves the environment and provides income for local communities; a sustainable development strategy for biodiversity-rich developing nations.'},
{topic:'7.7 Changes as a Result of the World Economy',term:'Export processing zones',def:'Designated industrial areas near ports or borders with favorable tariff treatment and reduced regulations to attract foreign direct investment and promote export manufacturing.'},
{topic:'7.4 Women and Economic Development',term:'Fertility rates (development context)',def:'In development geography, birth rates serve as an indicator of women\'s education level and economic empowerment; female education is the single most reliable predictor of fertility decline.'},
{topic:'7.1 The Industrial Revolution',term:'Fordism',def:'System of mass production using assembly lines and division of labor; standardized goods, workers as consumers.'},
{topic:'7.2 Economic Sectors and Patterns',term:'Formal economy',def:'The portion of the economy that is officially regulated, taxed, and measured in GDP statistics; includes registered businesses and formal employment contracts.'},
{topic:'7.8 Sustainable Development',term:'Fossil fuels',def:'Coal, oil, and natural gas formed from ancient organic matter; fossil fuel combustion drove industrialization but is the primary driver of climate change through CO2 emissions.'},
{topic:'7.6 Trade and the World Economy',term:'Free Trade Agreements',def:'International treaties between countries that reduce or eliminate tariffs, import quotas, and trade barriers to facilitate free flow of goods and services. Examples: USMCA, EU single market.'},
{topic:'7.3 Measures of Development',term:'GDP per capita',def:'Gross Domestic Product divided by population. A standard but limited measure of economic development.'},
{topic:'7.4 Women and Economic Development',term:'Gender empowerment',def:'The process of increasing women\'s access to education, economic opportunity, political representation, and reproductive rights; strongly correlated with lower fertility rates and higher development outcomes.'},
{topic:'7.4 Women and Economic Development',term:'Gender Inequality Index (GII)',def:'Measures gender-based disparities in reproductive health, political empowerment, and labor market participation.'},
{topic:'7.3 Measures of Development',term:'Gini coefficient',def:'A measure of income inequality within a country; 0 = perfect equality, 1 = perfect inequality.'},
{topic:'7.3 Measures of Development',term:'Gross Domestic Product (GDP)',def:'The total monetary value of all goods and services produced within a country\'s borders in a given year; the most widely used but imperfect measure of economic output.'},
{topic:'7.3 Measures of Development',term:'Gross National Income per capita',def:'The total income earned by a country\'s residents divided by population; used by the World Bank to classify countries by income level.'},
{topic:'7.3 Measures of Development',term:'Gross National Product (GNP)',def:'The total value of all goods and services produced by a country\'s residents, regardless of location; includes income earned abroad but excludes income earned within the country by foreigners.'},
{topic:'7.5 Theories of Development',term:'Growth poles',def:'Industries or geographic regions acting as engines of economic development, stimulating growth in surrounding areas through investment, employment, and infrastructure spending.'},
{topic:'7.2 Economic Sectors and Patterns',term:'High technology industries',def:'Research and development-intensive industries including semiconductors, biotechnology, aerospace, and software, typically concentrated in core nations and special economic zones.'},
{topic:'7.3 Measures of Development',term:'Human Development Index (HDI)',def:'Composite measure using GDP per capita, life expectancy, and education level. Ranges from 0 to 1.'},
{topic:'7.5 Theories of Development',term:'Imperialism (economic legacy)',def:'The extension of one nation\'s power over other territories; the historical legacy of European imperialism fundamentally structured today\'s unequal global development patterns.'},
{topic:'7.3 Measures of Development',term:'Income distribution',def:'How a nation\'s total income is spread across its population; measured by the Gini coefficient. High GDP per capita can coexist with extreme inequality.'},
{topic:'7.1 The Industrial Revolution',term:'Industrial Revolution',def:'Transition from agrarian to industrial economies beginning in Britain (~1760), using fossil fuels, machinery, and factory production.'},
{topic:'7.1 The Industrial Revolution',term:'Industrialization',def:'The transformation of an economy from primarily agricultural to primarily manufacturing-based, characterized by mechanization, factory production, urbanization, and use of fossil fuels.'},
{topic:'7.3 Measures of Development',term:'Infant mortality rates',def:'The number of deaths of children under one year of age per 1,000 live births; one of the most sensitive indicators of healthcare quality, nutrition, and overall development level.'},
{topic:'7.2 Economic Sectors and Patterns',term:'Informal economy',def:'Economic activity that is not regulated, taxed, or officially recorded; includes street vending, informal housing construction, and unregistered small businesses.'},
{topic:'7.7 Changes as a Result of the World Economy',term:'International division of labor',def:'The global specialization of production, with core nations focusing on high-value design and finance while periphery nations provide cheap manufacturing labor and raw material extraction.'},
{topic:'7.7 Changes as a Result of the World Economy',term:'International Monetary Fund',def:'An international financial institution providing loans to countries in balance-of-payments crises, typically requiring structural adjustment including austerity, privatization, and market liberalization.'},
{topic:'7.7 Changes as a Result of the World Economy',term:'Just-in-time delivery',def:'A production and logistics strategy in which inputs arrive exactly when needed, minimizing inventory costs; requires highly reliable global supply chains.'},
{topic:'7.4 Women and Economic Development',term:'Labor-market participation',def:'The percentage of working-age people who are employed or actively seeking employment; women\'s participation is a key indicator of gender equality and economic development.'},
{topic:'7.3 Measures of Development',term:'Literacy rates',def:'The percentage of adults who can read and write; a component of the HDI and a fundamental indicator of human capital development and educational investment.'},
{topic:'7.2 Economic Sectors and Patterns',term:'Manufacturing',def:'The secondary sector transformation of raw materials into finished goods through industrial processes; historically the primary engine of economic development.'},
{topic:'7.7 Changes as a Result of the World Economy',term:'Maquiladora',def:'Factories in Mexico near the US border that import materials duty-free, assemble products, and export them to the US.'},
{topic:'7.6 Trade and the World Economy',term:'Markets',def:'The systems through which buyers and sellers exchange goods, services, and capital; access to domestic and international markets is a fundamental determinant of economic development.'},
{topic:'7.6 Trade and the World Economy',term:'MERCOSUR',def:'A South American trade bloc including Brazil, Argentina, Uruguay, and Paraguay as full members; promotes tariff-free trade and movement of people within the region.'},
{topic:'7.4 Women and Economic Development',term:'Microfinance',def:'Small loans and financial services to low-income individuals (especially women) to support entrepreneurship.'},
{topic:'7.4 Women and Economic Development',term:'Microloans',def:'Very small loans provided to low-income individuals especially women entrepreneurs in developing countries to start or expand small businesses; the foundation of the microfinance movement.'},
{topic:'7.1 The Industrial Revolution',term:'Multiplier effect',def:'The process by which new economic investment stimulates additional activity: a new factory hires workers who spend money locally, supporting more businesses and jobs in a ripple effect.'},
{topic:'7.5 Theories of Development',term:'Neoliberal policies',def:'Economic policies emphasizing free markets, privatization, deregulation, and reduced government spending; promoted by the IMF and World Bank but criticized for widening inequality.'},
{topic:'7.7 Changes as a Result of the World Economy',term:'Outsourcing',def:'Contracting work to external companies often in lower-wage countries to reduce costs; a primary driver of deindustrialization in core nations and industrialization in periphery nations.'},
{topic:'7.5 Theories of Development',term:'Periphery countries',def:'In world-systems theory, less-developed nations exporting raw materials and low-wage labor to core nations; characterized by weak institutions, low wages, and dependence on foreign capital.'},
{topic:'7.1 The Industrial Revolution',term:'Post-Fordism',def:'Flexible, specialized production replacing mass manufacturing; associated with deindustrialization in developed nations and outsourcing.'},
{topic:'7.1 The Industrial Revolution',term:'Post-Fordist methods',def:'Flexible, specialized production systems replacing mass assembly-line manufacturing; characterized by outsourcing, just-in-time delivery, niche market customization, and globally dispersed supply chains.'},
{topic:'7.2 Economic Sectors and Patterns',term:'Primary sector',def:'Extraction of natural resources — farming, mining, fishing, forestry.'},
{topic:'7.2 Economic Sectors and Patterns',term:'Quaternary sector',def:'Knowledge and information economy — research, finance, IT, consulting.'},
{topic:'7.2 Economic Sectors and Patterns',term:'Quinary sector',def:'Highest-level decision-making — government leaders, CEOs, top scientists.'},
{topic:'7.8 Sustainable Development',term:'Renewable energy',def:'Energy from sources naturally and rapidly replenished including solar, wind, and hydroelectric power; central to sustainable development and climate change mitigation.'},
{topic:'7.4 Women and Economic Development',term:'Reproductive health',def:'A state of physical, mental, and social well-being regarding the reproductive system; access to reproductive healthcare is closely linked to women\'s empowerment and demographic change.'},
{topic:'7.5 Theories of Development',term:'Rostow\'s Stages of Growth model',def:'Five-stage model: traditional society → preconditions for takeoff → takeoff → drive to maturity → mass consumption.'},
{topic:'7.2 Economic Sectors and Patterns',term:'Secondary sector',def:'Manufacturing and processing of raw materials into finished goods.'},
{topic:'7.5 Theories of Development',term:'Semi-periphery',def:'Nations occupying an intermediate position in world-systems theory: they process periphery raw materials and export to core nations while themselves being exploited by core nations. Examples: Brazil, China, India.'},
{topic:'7.5 Theories of Development',term:'Semi-periphery countries',def:'Nations more economically developed than periphery nations but less dominant than core nations; they serve as a buffer zone in the global economic hierarchy.'},
{topic:'7.2 Economic Sectors and Patterns',term:'Service sectors',def:'The collective tertiary and quaternary economic activities including retail, healthcare, education, finance, and IT that dominate employment in developed economies.'},
{topic:'7.4 Women and Economic Development',term:'Small-scale finance',def:'Financial services including microloans, savings accounts, and insurance targeted at low-income individuals and micro-enterprises excluded from formal banking.'},
{topic:'7.7 Changes as a Result of the World Economy',term:'Special Economic Zone (SEZ)',def:'A designated area with favorable trade and tax regulations to attract foreign investment.'},
{topic:'7.8 Sustainable Development',term:'Sustainable development',def:'Development meeting present needs without compromising future generations\' ability to meet theirs. (Brundtland, 1987)'},
{topic:'7.6 Trade and the World Economy',term:'Tariffs',def:'Taxes levied by a government on imported goods; used to protect domestic industries from foreign competition and generate revenue, but tend to raise consumer prices and reduce trade.'},
{topic:'7.2 Economic Sectors and Patterns',term:'Tertiary sector',def:'Service economy — retail, healthcare, education, tourism.'},
{topic:'7.8 Sustainable Development',term:'UN Sustainable Development Goals (SDGs)',def:'17 goals adopted by UN member states in 2015 addressing poverty, inequality, climate, and sustainability by 2030.'},
{topic:'7.5 Theories of Development',term:'Uneven development',def:'The geographic reality that economic growth does not occur uniformly across space, creating persistent disparities between core and periphery at global, national, and local scales.'},
{topic:'7.5 Theories of Development',term:'Wallerstein\'s World System Theory',def:'Immanuel Wallerstein\'s model dividing the global economy into core (wealthy, high-tech), semi-periphery (emerging), and periphery (resource-exporting) nations in an unequal capitalist system.'},
{topic:'7.6 Trade and the World Economy',term:'World Trade Organization',def:'The international organization establishing rules governing global trade, providing a forum for negotiating trade agreements, and mediating trade disputes between member nations.'},
{topic:'7.5 Theories of Development',term:'World-systems theory',def:'Wallerstein: core (wealthy, high-tech), semi-periphery (emerging), and periphery (resource-exporting, less developed).'}
],
mcqs:[
{topic:'7.5',diff:'medium',stem:'According to dependency theory, why do developing nations remain economically underdeveloped?',options:['They haven\'t reached the "takeoff" stage','Their governments are inherently corrupt','They are exploited by wealthy core nations through unequal trade and resource extraction','They lack the natural resources needed for development'],answer:2,exp:'Dependency theory argues the global economic system is structured to benefit wealthy core nations at the expense of peripheral nations — through unequal terms of trade, resource extraction, and debt.'},
{topic:'7.3',diff:'medium',stem:'Which measure best captures gender-based disparities in access to education and political participation?',options:['GDP per capita','Human Development Index','Gender Inequality Index','Gini coefficient'],answer:2,exp:'The GII specifically measures gender disparities in reproductive health, political empowerment, and labor market participation — gaps that HDI and GDP do not capture.'},
{topic:'7.2',diff:'medium',stem:'A financial analyst in New York City working in investment banking is employed in which economic sector?',options:['Primary','Secondary','Tertiary','Quaternary'],answer:3,exp:'Investment banking is knowledge-intensive and information-based — placing it in the quaternary sector, associated with highly developed economies.'},
{topic:'7.7',diff:'medium',stem:'China established Special Economic Zones in coastal cities primarily to:',options:['Reduce rural-to-urban migration','Attract foreign investment and promote export-led economic growth','Preserve traditional manufacturing methods','Create domestic markets for Chinese-made goods'],answer:1,exp:'China\'s SEZs offered preferential tax treatment and relaxed regulations to attract foreign firms — driving the export-led industrialization that transformed China\'s economy.'},
{topic:'7.5',diff:'medium',stem:'Wallerstein classifies Brazil as a "semi-periphery" nation. This means Brazil:',options:['Is among the world\'s poorest nations','Exports high-tech goods to core nations','Processes raw materials from periphery nations while itself being exploited by core nations','Relies entirely on core nations for manufactured goods'],answer:2,exp:'Semi-periphery nations occupy a middle position: they exploit less-developed periphery nations while also being exploited by core nations, often through intermediate manufacturing.'},
{topic:'7.7',diff:'medium',stem:'Closure of steel mills and coal mines in the US Rust Belt as manufacturing moved to Mexico and Southeast Asia is an example of:',options:['The Industrial Revolution','Fordism','Deindustrialization','The Green Revolution'],answer:2,exp:'Deindustrialization refers to the decline of manufacturing in a region — often as jobs move to lower-wage locations. The US Rust Belt is the classic American example.'},
{topic:'7.3',diff:'medium',stem:'Which is a significant limitation of GDP per capita as a measure of development?',options:['It is too difficult to calculate for most countries','It does not account for income inequality, quality of life, or access to services','It overestimates the role of the agricultural sector','It only applies to market economies'],answer:1,exp:'GDP per capita is an average that masks inequality and says nothing about life expectancy, education, environmental quality, or political freedom.'},
{topic:'7.7',diff:'medium',stem:'Mexican maquiladoras import raw materials duty-free, assemble products, and export them to the United States. This primarily benefits:',options:['Mexican workers who earn wages comparable to US workers','US consumers (lower prices) and corporations (lower labor costs), while Mexican workers earn lower wages','The Mexican government through high export tariffs','Domestic Mexican consumers who buy the manufactured goods'],answer:1,exp:'Maquiladoras benefit US corporations through lower labor costs and US consumers through cheaper goods. Mexican workers gain employment but earn far less than US counterparts.'},
{topic:'7.5',diff:'medium',stem:'Rostow\'s Stages of Growth model has been criticized primarily because:',options:['It accurately describes development in Africa but not in Asia','It assumes all countries will follow the same Western industrialization path','It focuses too much on agriculture','It was developed by a dependency theorist'],answer:1,exp:'Critics argue Rostow\'s model is ethnocentric — it assumes all nations will and should follow the path of Western industrialization, ignoring colonialism and structural inequality.'},
{topic:'7.8',diff:'medium',stem:'The Brundtland Commission defined sustainable development as development that:',options:['Prioritizes economic growth above environmental concerns','Meets present needs without compromising future generations\' ability to meet theirs','Focuses exclusively on renewable energy','Applies only to developing nations'],answer:1,exp:'The 1987 Brundtland Report\'s definition remains the standard: meeting present needs without compromising future generations\' ability to meet their own needs.'},
{topic:'7.5',diff:'hard',stem:'South Korea and Taiwan transformed from poor agricultural nations in the 1950s to high-income industrial economies by the 1990s through state-directed investment in manufacturing, education, and exports. Which development theory best explains this trajectory, and which does it challenge?',options:['This supports dependency theory — South Korea and Taiwan were exploited as peripheral nations','This supports Rostow\'s model (progression through development stages) and challenges dependency theory — it shows that periphery nations can develop within the global economy through strategic state intervention','This supports world-systems theory by showing all countries are permanently locked in core/periphery positions','This challenges Rostow\'s model because South Korea skipped the agricultural stage'],answer:1,exp:'The East Asian "tiger" economies are the central challenge to dependency theory: they suggest that integration into the global economy, when combined with strategic state investment, can allow periphery nations to develop. They loosely follow Rostow\'s stages, though through state-led rather than purely market-driven processes.'},
{topic:'7.3',diff:'hard',stem:'Norway has very high GDP per capita (from oil exports) and distributes wealth broadly through a welfare state. Nigeria also has high oil-GDP but most citizens remain poor. Which combination of measures would best capture this contrast?',options:['GDP per capita alone captures the difference','A combination of GDP per capita, Gini coefficient (income inequality), and HDI would reveal that Norway\'s wealth is broadly distributed (low Gini, high HDI) while Nigeria\'s oil wealth is concentrated (high Gini) and does not translate into broad human development','IMR alone would capture the difference','The GII captures this difference'],answer:1,exp:'GDP per capita would show both countries as oil-wealthy — missing the entire story of distribution and human outcomes. The combination of Gini, HDI, and GDP reveals the "resource curse" paradox: oil wealth can coexist with mass poverty when governance fails to distribute it.'},
{topic:'7.7',diff:'hard',stem:'A garment factory in Bangladesh produces clothing for American brands. The factory employs 500 workers, mostly women, at low wages. The clothing is sold in the US at prices most Americans can afford. Which geographic framework best captures ALL the relationships in this scenario?',options:['Bid-rent theory — the factory is located far from urban markets','World-systems theory and the global commodity chain: Bangladesh (periphery/semi-periphery) provides low-cost manufacturing labor; the US (core) controls design, branding, retail, and profit; women workers in Bangladesh are incorporated into the global economy at its lowest-value nodes','Rostow\'s model — Bangladesh is in the "takeoff" stage because it has factories','Dependency theory alone — Bangladesh is being exploited with no benefit to its workers'],answer:1,exp:'The global commodity chain is the key analytical framework: value is added at each stage (fiber → fabric → garment → branded product → retail) but distributed very unequally. Bangladesh captures the assembly stage (lowest value-added). The brand (US) captures design, marketing, and retail (highest value-added). World-systems theory explains WHY this geographic division of labor exists.'},
{topic:'7.8',diff:'hard',stem:'A country rich in fossil fuels chooses to invest resource revenues in renewable energy infrastructure, education, and social services rather than consumption. Critics argue this sacrifices current economic growth; supporters argue it\'s the only path to long-term prosperity. Which concept directly underlies the supporters\' argument?',options:['Fordism — mass production requires fossil fuels','Comparative advantage — the country should specialize in what it does best','Sustainable development — current resource revenues should be invested to ensure future generations\' wellbeing rather than consumed today','Dependency theory — the country is trying to escape core-periphery exploitation'],answer:2,exp:'This is sustainable development applied at the national scale. The Brundtland definition directly supports investing resource revenues rather than consuming them. Norway\'s Government Pension Fund embodies exactly this logic — using today\'s oil revenues to build wealth for future Norwegians after the oil runs out.'},
{topic:'7.2',diff:'hard',stem:'In 1950, a typical US worker was likely employed in manufacturing. By 2020, the largest employment sector in the US was services. A US city that thrived on steel production in 1950 now struggles with unemployment and population loss. Which combination of concepts explains this transformation?',options:['The Industrial Revolution — the US is still industrializing','Deindustrialization (manufacturing declining as production moved to lower-wage regions) combined with the sectoral shift from secondary to tertiary/quaternary employment — but this transition created geographic winners (cities with educated workforces) and losers (rust belt cities built entirely on manufacturing)','Post-Fordism benefited all cities equally because service jobs replaced manufacturing jobs one-for-one','The Von Thünen model — manufacturing relocated to the outer rings of American cities'],answer:1,exp:'The key geographic insight: deindustrialization\'s effects were spatially uneven. Cities with diverse economies and educated workforces (Boston, NYC, San Francisco) pivoted to knowledge/service economies. Cities built on single-industry manufacturing (Detroit, Pittsburgh, Cleveland) faced collapse when that industry left. The sectoral shift is real, but its geographic consequences depend on each city\'s existing economic structure.'},
{topic:'7.6',diff:'hard',stem:'Country A produces both wheat and semiconductors more efficiently than Country B. According to comparative advantage, should Country A produce both goods?',options:['Yes — Country A is better at both, so it should produce both','No — Country A should specialize in semiconductors (its relative advantage is greater) and trade for wheat; Country B should specialize in wheat — both countries gain more from specialization and trade than from self-sufficiency','Yes — comparative advantage only applies when one country is better at one thing','No — Country A should produce only wheat because food security is more important than semiconductors'],answer:1,exp:'Comparative advantage is about opportunity cost, not absolute efficiency. Even if Country A is better at BOTH products, it has a comparative advantage in whichever it gives up less to produce. By specializing and trading, both countries consume more than if each produced everything — this is the geographic logic behind international trade specialization.'},
{topic:'7.5',diff:'hard',stem:'A geographer is asked to explain why sub-Saharan Africa remains the world\'s poorest region despite having abundant natural resources. Which combination of theoretical frameworks provides the most complete explanation?',options:['Rostow\'s model alone — Africa simply hasn\'t reached the takeoff stage yet','Dependency theory (colonial resource extraction structured African economies to export raw materials for external benefit) combined with world-systems theory (African nations remain in the periphery) and post-colonial political geography (colonial boundaries created states with low internal cohesion, undermining governance) — multiple frameworks provide a more complete explanation','African poverty is simply a result of poor governance with no historical or structural causes','World-systems theory alone fully explains African poverty'],answer:1,exp:'Sub-Saharan Africa\'s development challenges require multi-framework analysis: dependency theory explains the colonial structuring of export economies; world-systems theory maps the current core-periphery relationship; political geography explains how colonial-era superimposed boundaries created multinational states with centrifugal ethnic conflicts that undermine governance and investment. No single theory is sufficient.'},
{topic:'7.4',diff:'hard',stem:'Microfinance programs that lend small amounts to women entrepreneurs in developing countries have had mixed results. In some cases they reduced poverty; in others, women\'s husbands controlled the loan funds, reducing benefits to women. What does this outcome reveal about the geography of development?',options:['Microfinance is a failed development strategy and should be abandoned','Development interventions do not work at the local scale','Development outcomes are shaped by local cultural geographies (gender norms, household power dynamics) that external programs cannot always anticipate — illustrating that development is not a technocratic process but a socially and geographically embedded one','Women in developing countries are not capable of managing financial resources'],answer:2,exp:'This outcome illustrates that development interventions interact with local social geographies in complex ways. Microfinance\'s logic assumes that loan access translates directly to women\'s control — but in contexts of strong patriarchal household structures, this assumption fails. Development programs that ignore local cultural context often produce unintended outcomes.'},{topic:'7.4',diff:'medium',stem:'The Gender Inequality Index (GII) measures disparities between men and women in three specific dimensions. Which combination does the GII measure?',options:['Life expectancy, literacy rate, and GDP per capita','Reproductive health (maternal mortality and adolescent birth rates), empowerment (parliamentary seats and educational attainment), and labor market participation','Infant mortality rate, access to clean water, and average household income','Political representation, religious participation, and agricultural labor'],answer:1,exp:'The GII captures three specific dimensions of gender inequality: reproductive health (maternal mortality ratio and adolescent birth rate); empowerment (share of parliamentary seats and population with at least secondary education, by gender); and labor market participation rate by gender. This makes the GII a more targeted measure of gender-specific disadvantage than the HDI, which does not disaggregate outcomes by gender. CED Topic 7.4 — Women and Economic Development.'},
{topic:'7.5',diff:'hard',stem:'South Korea industrialized rapidly while Nigeria has vast oil wealth but remains relatively poor. Both are cited in different theoretical frameworks. Which pairing of theories correctly explains each country\'s trajectory?',options:['Rostow\'s model explains South Korea (successfully moved through development stages via state investment in industry and education); resource curse / dependency theory explains Nigeria (oil wealth captured by elites, perpetuating underdevelopment despite natural resources)','Dependency theory explains South Korea; Rostow\'s model explains Nigeria','World-systems theory explains both equally well','Neither country\'s trajectory can be explained by existing development theories'],answer:0,exp:'South Korea is the poster child for the modified Rostow argument — strategic state-directed industrialization successfully moved it through development stages. Nigeria illustrates the "resource curse": abundant natural resources combined with weak governance and dependency-theory dynamics (multinational corporations extracting oil value) have failed to translate wealth into broad development. These contrasting cases show that no single theory explains all development outcomes.'},
],
frqs:[
{type:'No Stimulus FRQ',prompt:'Development geographers use multiple theories to explain global economic inequality.\n\nA. Describe Rostow\'s Stages of Growth model.\nB. Explain ONE major criticism of Rostow\'s model.\nC. Explain how dependency theory offers an alternative explanation for why some countries remain economically underdeveloped.',guide:[{pts:2,text:'A. Rostow\'s model: all countries move through five stages — traditional society (subsistence), preconditions for takeoff (infrastructure, trade), takeoff (industrial growth), drive to maturity (diversified economy), mass consumption (high incomes, consumer society). The US and UK are models.'},{pts:1,text:'B. Criticism: ethnocentric (assumes Western path is universal), ignores colonialism and structural inequality, does not account for countries that industrialized differently (East Asian tigers), or those that regressed economically despite resources.'},{pts:2,text:'C. Dependency theory: wealthy core nations created a global economic system that extracts resources and labor from periphery nations through unequal trade, structural adjustment programs, and debt. Even when periphery nations try to develop, the terms of trade work against them — they export cheap raw materials and import expensive manufactured goods, perpetuating underdevelopment.'}]},
{type:'1-Stimulus FRQ',prompt:'The concept of sustainable development has become central to geographic discussions of economic growth and environmental protection.\n\nA. Define sustainable development.\nB. Explain ONE tension between economic development goals and sustainable development principles.\nC. Identify ONE specific strategy that a country or city can implement to pursue sustainable development and explain how it addresses both economic and environmental goals.',guide:[{pts:1,text:'A. Sustainable development: development that meets the needs of the present without compromising the ability of future generations to meet their own needs (Brundtland Commission, 1987).'},{pts:2,text:'B. Tension: developing nations often argue they need to industrialize using cheap fossil fuels (as developed nations did) to raise living standards — but this accelerates climate change. Developing countries produce a fraction of historical emissions but bear the heaviest burden of climate impacts, creating a fundamental equity tension.'},{pts:2,text:'C. Strategy example: investment in renewable energy (solar, wind) creates jobs (economic development), reduces carbon emissions, and provides energy access to rural communities without grid infrastructure. Example: Morocco\'s Noor solar complex generates electricity for millions while reducing fossil fuel dependence and training a renewable energy workforce.'}]},
]},
];

const SKILLS=[
{id:'SK1',num:1,name:'Concepts & Processes\'',color:'#185FA5',bg:'#E6F1FB\'',
 desc:'Describe, explain, and compare geographic concepts, models, and theories. Evaluate their strengths and limitations.',
 subskills:'1.A Describe · 1.B Explain · 1.C Compare · 1.D Apply to context · 1.E Evaluate strengths/limitations\'',
 qs:[
  {sub:'1.A\'',unit:'Unit 2',diff:'medium\'',stem:'Which of the following best describes the Demographic Transition Model (DTM)?',options:['A model showing the geographic distribution of population across Earth\'s surface\'','A five-stage model tracing the historical shift from high to low birth and death rates as countries develop economically\'','A model predicting that population growth will inevitably outpace food supply\'','A model explaining the push and pull factors that drive international migration'],answer:1,exp:'The DTM describes how birth rates and death rates change through five stages as a country industrializes and develops — it is fundamentally a model of vital rate change over time, not a population distribution or migration model.'},
  {sub:'1.B\'',unit:'Unit 3',diff:'medium\'',stem:'Why does stimulus diffusion best describe the global spread of fast-food culture, rather than relocation or contagious diffusion?',options:['Because fast-food workers physically migrated to new countries carrying the concept with them\'','Because the underlying principle of standardized quick-service food spread globally even as specific menus adapted to local tastes\'','Because fast food spread directly from person to person through continuous direct contact\'','Because major cities adopted fast food first and it trickled down to smaller towns'],answer:1,exp:'Stimulus diffusion occurs when the underlying idea spreads and is locally adapted, even as the original form changes. The fast-food concept spread globally while menus adapted to local cultures — the stimulus spread, not a fixed cultural form.'},
  {sub:'1.C\'',unit:'Unit 4',diff:'medium\'',stem:'Which best compares a unitary state and a federal state?',options:['In a unitary state, regional governments have equal power to the central government; in a federal state, the central government is supreme\'','In a unitary state, power is concentrated in the central government with limited regional autonomy; in a federal state, power is constitutionally divided between central and regional governments\'','Unitary states are found only in Europe; federal states are found only in the Americas\'','Federal states are always more democratic than unitary states'],answer:1,exp:'The key distinction is power distribution: unitary states centralize authority (France, Japan), while federal states constitutionally guarantee regional governments authority over specific policy areas (USA, Germany, India).'},
  {sub:'1.D\'',unit:'Unit 5',diff:'medium\'',stem:'A farmer in Iowa grows corn on 2,000 acres using GPS-guided tractors and chemical fertilizers, selling the entire harvest to a grain elevator. Which concept best describes this operation?',options:['Subsistence agriculture\'','Pastoral nomadism\'','Commercial extensive agriculture\'','Market gardening'],answer:2,exp:'This operation is commercial (producing for sale) and extensive (using large land areas with high capital but relatively low labor inputs per acre) — classic characteristics of Midwestern American grain farming.'},
  {sub:'1.E\'',unit:'Unit 5',diff:'hard\'',stem:'The Von Thunen model was developed in early 19th-century Germany before refrigeration and modern transportation. What is its most significant limitation today?',options:['The model incorrectly predicted that dairy farming would be nearest to the market\'','The model assumed a flat plain with one market city, but modern refrigeration and global transportation have collapsed distance costs, making its concentric ring predictions largely obsolete\'','The model only applies to European farming and never described American patterns\'','The model overestimated the importance of land rent in agricultural decision-making'],answer:1,exp:'The Von Thunen model\'s core logic breaks down when refrigeration allows dairy and vegetables to travel thousands of miles and global commodity markets set prices regardless of distance to a single local market.'},
  {sub:'1.A\'',unit:'Unit 6',diff:'medium\'',stem:'Which best describes the concentric zone model of urban structure?',options:['A model showing cities developing around multiple independent activity centers\'','A model in which land uses radiate from the CBD in wedge-shaped sectors along transportation corridors\'','A model in which cities grow outward from the CBD in a series of concentric rings, each with distinct land use characteristics\'','A model showing elite housing near the CBD with squatter settlements on the periphery'],answer:2,exp:'The concentric zone model (Burgess, 1925) proposes that cities expand outward from the CBD in concentric rings: CBD, transition zone, working-class residential, middle-class residential, and commuter zone.'},
  {sub:'1.B\'',unit:'Unit 7',diff:'hard\'',stem:'How does dependency theory differ from Rostow\'s Stages of Growth model in explaining persistent underdevelopment?',options:['Rostow\'s model argues development is impossible for peripheral nations; dependency theory argues all nations will eventually develop\'','Rostow\'s model sees underdevelopment as a temporary stage all nations pass through; dependency theory argues the global economic system is structurally designed to keep peripheral nations underdeveloped for the benefit of core nations\'','Both models agree that free trade and market integration are the primary solutions to underdevelopment\'','Dependency theory was developed first and Rostow\'s model was created in response to it'],answer:1,exp:'Rostow treats underdevelopment as a phase — nations simply haven\'t yet reached "takeoff." Dependency theory rejects this entirely, arguing the core-periphery relationship is structural and self-reinforcing: core nations benefit from keeping periphery nations as raw material suppliers.'},
  {sub:'1.C\'',unit:'Unit 2',diff:'medium\'',stem:'Which best compares the Malthusian theory and the Boserup Theory regarding population growth and food supply?',options:['Both predicted that population growth would eventually cause famine\'','Malthus argued population growth would outpace food supply causing crises; Boserup argued population growth stimulates agricultural innovation, expanding food supply to meet demand\'','Malthus focused on developed nations while Boserup focused only on developing nations\'','Boserup agreed with Malthus but added that technology would temporarily solve the food crisis'],answer:1,exp:'Malthus (1798) predicted geometric population growth would outrun arithmetic food supply growth. Boserup directly countered this: she argued population pressure is the catalyst for agricultural innovation — necessity forces farmers to intensify production.'},
  {sub:'1.D\'',unit:'Unit 4',diff:'medium\'',stem:'Russia\'s 2014 justification for annexing Crimea — that ethnic Russians there deserved political unification with Russia — most directly invokes which political geography concept?',options:['Supranationalism\'','Devolution\'','Irredentism\'','Balkanization'],answer:2,exp:'Irredentism is the political movement to incorporate territory inhabited by co-nationals currently under another state\'s control. Russia\'s claim to Crimea based on its ethnic Russian population is a textbook application of irredentist logic.'},
  {sub:'1.E\'',unit:'Unit 6',diff:'hard\'',stem:'A student argues the concentric zone model best explains the internal structure of all world cities. Which most effectively challenges this claim?',options:['The concentric zone model was proven mathematically incorrect by later geographers\'','Cities in Latin America, Southeast Asia, and sub-Saharan Africa show very different internal structures reflecting different colonial histories that the Chicago-based model cannot capture\'','The concentric zone model has been entirely replaced by the multiple nuclei model\'','All cities worldwide now follow the galactic city model due to globalization'],answer:1,exp:'The concentric zone model\'s critical limitation is its historical and geographic specificity: based on 1920s industrial Chicago. Latin American, African, and Asian cities developed under different colonial conditions, producing patterns the Burgess model cannot predict.'},
 ]
},
{id:'SK2',num:2,name:'Spatial Relationships\'',color:'#0F6E56',bg:'#E1F5EE\'',
 desc:'Describe and explain spatial patterns and networks. Predict geographic outcomes. Evaluate how well models explain real-world patterns.',
 subskills:'2.A Describe patterns · 2.B Explain relationships · 2.C Predict outcomes · 2.D Compare locations · 2.E Evaluate model effectiveness\'',
 qs:[
  {sub:'2.A\'',unit:'Unit 2',diff:'medium\'',stem:'Which best describes the global pattern of population distribution?',options:['Population is distributed evenly across all continents in proportion to land area\'','Population is heavily concentrated in a few regions — East Asia, South Asia, Europe, and eastern North America — with vast areas of very low density\'','Population is most dense in the interior regions of large continents away from coastlines\'','Population density is highest in countries with the largest total land area'],answer:1,exp:'Earth\'s population is dramatically uneven: approximately 60% of all people live in Asia. The highest densities cluster in East Asia, South Asia, and parts of Europe — all sharing histories of intensive agriculture, river valley civilizations, and/or industrialization.'},
  {sub:'2.B\'',unit:'Unit 3',diff:'medium\'',stem:'The Spanish language is spoken across nearly all of Latin America. Which geographic process best explains this spatial pattern?',options:['Contagious diffusion from a single point spreading naturally across the continent\'','Relocation diffusion through European colonial settlement, conquest, and imposition of Spanish over indigenous languages\'','The natural evolution of indigenous languages toward Spanish over thousands of years\'','Hierarchical diffusion from major Latin American cities downward to rural areas'],answer:1,exp:'Spanish dominance in Latin America is the direct result of relocation diffusion: Spanish colonizers physically settled the region beginning in the late 15th century, bringing their language and imposing it through conquest, religious conversion, and colonial administration.'},
  {sub:'2.C\'',unit:'Unit 5',diff:'medium\'',stem:'A government builds a high-speed railway connecting a farming region 200 miles from a major city. According to Von Thunen\'s logic, what outcome would most likely occur in that farming region?',options:['Ranching and extensive grain farming would expand because rail makes large-volume shipping easier\'','Agricultural land use would shift toward more intensive, higher-value crops like vegetables and dairy, since reduced transportation costs make these competitive farther from the market\'','All farmland would immediately convert to residential use due to improved accessibility\'','No change would occur because the Von Thunen model is not sensitive to transportation improvements'],answer:1,exp:'The Von Thunen model is fundamentally about transportation cost. Reducing transportation cost has the same economic effect as moving closer to the market. Crops previously viable only near the city now become competitive farther away.'},
  {sub:'2.D\'',unit:'Unit 6',diff:'medium\'',stem:'Compare the spatial location of low-income housing in a typical North American city (concentric zone model) versus a typical Latin American city (Griffin-Ford model).',options:['In both models, low-income housing is on the urban periphery\'','In North American cities, low-income housing is in the inner transition zone near the CBD; in Latin American cities, low-income squatter settlements are on the outer urban periphery while wealthy residents cluster near the CBD\'','Both models show low-income housing in identical locations\'','In Latin American cities, low-income housing is in the CBD; in North American cities, it is in the suburbs'],answer:1,exp:'In Burgess\'s model, the poor live closest to the CBD in the transition zone. In the Griffin-Ford (Latin American) model, the pattern is inverted: wealth clusters near the center, while squatter settlements ring the urban periphery.'},
  {sub:'2.E\'',unit:'Unit 4',diff:'hard\'',stem:'The Kurds are a nation of approximately 35 million people without their own independent state, spread across Turkey, Iraq, Iran, and Syria. To what extent does the nation-state model effectively describe this situation?',options:['The nation-state model effectively describes the Kurdish situation because Kurds share a common language and culture\'','The nation-state model poorly describes the Kurdish situation — it is an ideal type that rarely exists in practice; the Kurds demonstrate that nations and states frequently do not align, producing stateless nations and multinational states\'','The model effectively describes the situation because all four countries where Kurds live are nation-states\'','The Kurdish situation is best explained by the federal state model'],answer:1,exp:'The nation-state is an ideal type that rarely exists perfectly. The Kurdish case illustrates this: a large, culturally distinct nation divided among four sovereign states. This mismatch between cultural and political boundaries is a primary source of political conflict.'},
  {sub:'2.A\'',unit:'Unit 7',diff:'medium\'',stem:'Which best describes the spatial pattern of core, semi-periphery, and periphery countries in Wallerstein\'s world-systems theory?',options:['Core countries are evenly distributed across all continents\'','Core countries are concentrated in North America, Western Europe, and East Asia; periphery countries are concentrated in sub-Saharan Africa, parts of South Asia, and Central America; semi-periphery includes Brazil, China, and India\'','Core countries are all former colonial powers; periphery countries are all former colonies\'','The core-periphery distribution changes completely every decade'],answer:1,exp:'Wallerstein\'s world-systems theory maps onto a clear geographic pattern: wealthy industrialized core nations in the Global North; poor resource-exporting periphery nations in sub-Saharan Africa and parts of Asia and Central America; and a semi-periphery of large emerging economies.'},
  {sub:'2.B\'',unit:'Unit 2',diff:'hard\'',stem:'In many sub-Saharan African cities, rural-to-urban migration is increasing even as urban unemployment remains very high. Which concept best explains why people continue to migrate despite poor job prospects?',options:['Distance decay — people migrate only short distances regardless of economic conditions\'','The expected income model — migrants compare the probability-weighted expected urban wage against the certainty of low rural income; even with high unemployment, urban migration can be rational\'','Brain drain — skilled workers move to cities because that is where their skills are needed\'','Chain migration — people move only because earlier migrants from their village did so'],answer:1,exp:'The Todaro model explains this paradox: migration decisions are rational when based on expected (probability-weighted) income. If the urban wage multiplied by the probability of finding work exceeds rural income, migration is economically rational even when urban unemployment is high.'},
