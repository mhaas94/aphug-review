  {sub:'2.C\'',unit:'Unit 3',diff:'medium\'',stem:'A country bans foreign social media platforms and restricts import of foreign films and music. Which geographic outcome would most likely result over the following decade?',options:['The country\'s culture will converge with global culture as citizens find digital workarounds\'','Cultural divergence will increase as the country\'s cultural practices become more distinct from global trends by limiting the primary vectors of expansion diffusion\'','The country\'s language will rapidly change to become more similar to surrounding countries\'','The ban will cause rapid hierarchical diffusion of foreign culture through cities first'],answer:1,exp:'By blocking primary channels of expansion diffusion, the government reduces cultural convergence. Over time, limiting these diffusion vectors will likely increase cultural divergence — the gap between the country\'s cultural practices and global trends will widen.'},
  {sub:'2.D\'',unit:'Unit 7',diff:'hard\'',stem:'South Korea became a high-income economy while Nigeria remains lower-income despite significant oil wealth. What best accounts for this difference?',options:['South Korea has more natural resources than Nigeria\'','South Korea pursued strategic state investment in education and manufacturing exports, building human capital and industrial capacity; Nigeria\'s oil wealth concentrated in a single export commodity and was captured by elites, illustrating the resource curse\'','Climate explains the difference — South Korea\'s temperate climate enabled development\'','Both countries followed Rostow\'s model identically; Nigeria simply started development later'],answer:1,exp:'South Korea\'s economic miracle reflected deliberate state-directed industrial policy. Nigeria illustrates the resource curse: oil wealth created Dutch disease, elite capture, and commodity dependence — classic patterns described by dependency theory.'},
  {sub:'2.E\'',unit:'Unit 6',diff:'hard\'',stem:'The gravity model predicts greater interaction between larger, closer cities. To what extent does this model effectively explain migration patterns between rural Mexico and US cities?',options:['The gravity model perfectly explains Mexican-US migration because Mexico and the US are close and the US has a large population\'','The gravity model partially explains the pattern — proximity and destination size are relevant — but it fails to account for immigration enforcement, wage differentials, and social networks (chain migration) that dramatically shape migration flows\'','The gravity model is irrelevant to international migration because it only applies to trade flows\'','The gravity model overestimates migration because distance is irrelevant to modern migrants'],answer:1,exp:'The gravity model captures proximity and destination size, but international migration involves factors the model ignores: immigration enforcement as a powerful intervening obstacle; wage differentials; and chain migration that channels flows along specific social networks.'},
 ]
},
{id:'SK3',num:3,name:'Data Analysis\'',color:'#BA7517',bg:'#FAEEDA\'',
 desc:'Analyze and interpret quantitative geographic data in maps, tables, charts, and graphs. Identify patterns, compare trends, and evaluate data limitations.',
 subskills:'3.A Identify data types · 3.B Describe patterns · 3.C Explain trends · 3.D Compare patterns · 3.E Interpret implications · 3.F Evaluate limitations\'',
 qs:[
  {sub:'3.C\'',unit:'Unit 2',diff:'medium\'',stem:'A population pyramid for Country X shows a very wide base that narrows sharply at each successive age group. Which conclusion is best supported?',options:['Country X has a low birth rate and an aging population typical of Stage 4 DTM\'','Country X has high birth rates and high death rates, indicating a young rapidly growing population consistent with Stage 2 of the DTM\'','Country X has achieved replacement-level fertility and its population is stable\'','Country X has experienced significant in-migration of young adults'],answer:1,exp:'A wide base with rapidly narrowing bars indicates many young people (high birth rates) and few elderly (high mortality before old age). This shape is the classic visual signature of a Stage 2 DTM country with rapid population growth.'},
  {sub:'3.B\'',unit:'Unit 7',diff:'medium\'',stem:'Four countries show: Country A — HDI 0.95, GDP/capita $52,000, Gini 0.28. Country B — HDI 0.94, GDP/capita $48,000, Gini 0.51. Which pattern do these data most clearly suggest?',options:['Country A and B have identical development levels because their HDIs are similar\'','Country A and B have similar overall development levels, but income is distributed much more equitably in Country A (lower Gini); Country B has comparable wealth but significantly higher inequality\'','Country B is less developed than Country A because it has slightly lower GDP per capita\'','The Gini coefficient is not a meaningful development indicator'],answer:1,exp:'Similar HDI and GDP per capita indicate comparable overall development, but the Gini reveals a crucial difference: Country A (0.28) distributes income equitably (like Scandinavia), while Country B (0.51) has high inequality despite similar average wealth (like Brazil or South Africa).'},
  {sub:'3.D\'',unit:'Unit 2',diff:'medium\'',stem:'Country A has CBR of 38/1,000 and CDR of 12/1,000. Country B has CBR of 11/1,000 and CDR of 10/1,000. Which best compares their population growth trends?',options:['Both countries are growing at the same rate because both have positive NIR values\'','Country A has a much higher NIR (2.6%) and is growing rapidly; Country B has a very low NIR (0.1%) and is nearly stable — Country A is Stage 2 and Country B is Stage 4 of the DTM\'','Country B is growing faster than Country A because it has lower birth and death rates\'','Country A is in Stage 4 of the DTM and Country B is in Stage 2'],answer:1,exp:'NIR = CBR minus CDR. Country A: 38 minus 12 = 26 per 1,000 = 2.6% growth (Stage 2). Country B: 11 minus 10 = 1 per 1,000 = 0.1% growth (Stage 4). These dramatically different rates reveal very different demographic trajectories.'},
  {sub:'3.E\'',unit:'Unit 5',diff:'medium\'',stem:'A choropleth map shows dark shading (over 60% agricultural labor force) in sub-Saharan Africa and South/Southeast Asia, with light shading (under 20%) in North America, Europe, and Australia. What does this map most directly illustrate?',options:['Countries with more agricultural workers have higher food security\'','The proportion of workers in agriculture decreases as countries develop economically, reflecting the sectoral shift from primary to tertiary and quaternary activities — a core pattern in development geography\'','Countries with light shading produce less food than countries with dark shading\'','Agricultural employment is determined primarily by climate rather than level of economic development'],answer:1,exp:'This map illustrates one of geography\'s clearest development patterns: as countries industrialize, workers shift from agriculture (primary sector) to manufacturing (secondary) and services (tertiary/quaternary). The dark-to-light gradient from Global South to Global North reflects this sectoral transition.'},
  {sub:'3.F\'',unit:'Unit 2',diff:'medium\'',stem:'A researcher uses GDP per capita to compare living standards and concludes that oil-rich Gulf state citizens have among the world\'s highest living standards. What is the most significant limitation of this conclusion?',options:['GDP per capita is too difficult to calculate accurately for small countries\'','GDP per capita is an average that masks extreme inequality — oil wealth concentrates among citizens while large migrant worker populations earn very low wages; it also does not measure health outcomes, education, or political freedom\'','GDP per capita overestimates living standards in developing countries because it counts informal economy activity\'','GDP per capita data from Gulf states is unreliable because governments falsify statistics'],answer:1,exp:'GDP per capita\'s most critical limitation is that it is a mean, not a distribution measure. High per-capita GDP can reflect extreme wealth concentration. HDI and Gini coefficient provide a more complete picture.'},
  {sub:'3.A\'',unit:'Unit 6',diff:'medium\'',stem:'A geographer has: a ranked table of city populations, a dot map of urban residents, a choropleth map of population density, and a line graph of city population 1950-2020. Which source is most useful for testing the rank-size rule?',options:['The dot map, because it shows the spatial distribution of urban population\'','The ranked table of city populations, because the rank-size rule requires comparing the populations of the largest and successive cities in a country\'','The choropleth map, because it shows internal density patterns within cities\'','The line graph, because it shows population growth trajectories over time'],answer:1,exp:'The rank-size rule states the nth largest city should be 1/n the size of the largest city. To test this mathematical relationship, you need actual population figures ranked by size — exactly what a ranked population table provides.'},
  {sub:'3.C\'',unit:'Unit 3',diff:'medium\'',stem:'Data shows the number of languages spoken globally has declined from approximately 7,000 in 1950 to a projected 3,500 by 2100. Which conclusion is best supported by this trend?',options:['More languages are being created through creolization than are being lost, so total diversity is increasing\'','Accelerating linguistic diversity loss reflects the dominance of a few global languages driven by globalization, urbanization, and economic integration — consistent with cultural convergence and the marginalization of minority languages\'','Language loss is driven primarily by natural disasters and disease\'','The data is unreliable because linguists cannot accurately count languages'],answer:1,exp:'The rapid decline in language diversity reflects globalization\'s homogenizing cultural pressure: economic advancement increasingly requires dominant language fluency; minority speakers shift to dominant languages for economic opportunity; urbanization disrupts traditional community-based language transmission.'},
  {sub:'3.D\'',unit:'Unit 4',diff:'hard\'',stem:'Country A (federal, 50 regions) shows significantly higher regional variation in education funding and healthcare quality than Country B (unitary). Which comparison is most geographically significant?',options:['Country A\'s higher regional variation proves federalism is inferior to unitary governance\'','Country A\'s higher regional variation reflects federalism\'s characteristic: regional autonomy allows different policy choices, producing both innovation and inequality; Country B\'s lower variation reflects central control producing more uniform but potentially less locally responsive outcomes\'','The data cannot be compared because the two countries have different population sizes\'','Higher regional variation in Country A indicates that its regions are planning to secede'],answer:1,exp:'This comparison illustrates a fundamental governance trade-off: federalism\'s regional autonomy can produce innovation and local responsiveness, but also significant geographic inequality between regions. Unitary systems tend to produce more spatial uniformity through centralized standards.'},
  {sub:'3.E\'',unit:'Unit 7',diff:'hard\'',stem:'An infographic shows Ethiopian coffee farmers receive approximately $0.50 per pound at the farm gate, while the same coffee sells for $12-$15 per pound at US retail. What geographic principle do these data most clearly illustrate?',options:['Ethiopian coffee is low quality, which explains the low farm-gate price\'','The unequal distribution of value along global commodity chains: most economic value is captured by processors, roasters, brands, and retailers in core nations, while periphery-nation producers receive a small fraction — illustrating world-systems and dependency theory\'','Transport costs alone explain the price difference\'','Ethiopian farmers freely choose to sell at low prices because they prefer subsistence farming'],answer:1,exp:'This price gap directly illustrates world-systems theory: periphery nations (Ethiopia) supply raw materials at low prices while core nations (USA) capture value through processing, branding, and retail. The farmer receives roughly 4% of retail price — a stark quantitative illustration of core-periphery economic relationships.'},
  {sub:'3.F\'',unit:'Unit 6',diff:'hard\'',stem:'A city uses formal housing sales prices to map "neighborhood quality" across its metro area. Which limitation of this data is most significant?',options:['Housing sale data is always inaccurate because sellers misreport prices\'','The data excludes the informal housing sector where many lower-income residents live, systematically underrepresenting their neighborhoods and producing a map that reflects formal market activity rather than actual living conditions citywide\'','The data is too current; historical data from 50 years ago would be more accurate\'','Housing price data cannot be mapped geographically'],answer:1,exp:'Formal housing sales data has a critical coverage gap: it only captures properties sold through formal real estate markets. Lower-income neighborhoods with high rental rates, informal settlements, and rent-stabilized units generate little sales data, systematically omitting the poorest urban areas from the analysis.'},
 ]
},
{id:'SK4',num:4,name:'Source Analysis\'',color:'#993C1D\'',bg:'#FAECE7',
 desc:'Analyze qualitative geographic information from landscape photographs, maps, images, and cartoons. Identify patterns and evaluate source limitations.',
 subskills:'4.A Identify information types · 4.B Describe patterns · 4.C Explain trends · 4.D Compare sources · 4.E Connect to geographic principles · 4.F Evaluate limitations\'',
 qs:[
  {sub:'4.E\'',unit:'Unit 2',diff:'medium\'',stem:'A photograph shows a developing-world megacity hillside covered with densely packed homes made of corrugated metal and scrap wood, with no paved roads or utility lines. Which geographic principle does this image most directly illustrate?',options:['The sector model of urban land use, in which residential areas extend along transportation corridors\'','Informal settlements forming when rapid rural-to-urban migration outpaces a city\'s capacity to provide formal housing, services, and infrastructure\'','The concentric zone model\'s prediction that low-income housing concentrates near the CBD\'','Gentrification, in which wealthier residents displace lower-income residents from central city neighborhoods'],answer:1,exp:'The photograph\'s key visual elements — improvised construction materials, steep hillside location, absence of formal infrastructure — are the defining landscape signatures of informal settlements. These form when rural-to-urban migration creates population growth faster than formal housing markets and city governments can accommodate.'},
  {sub:'4.A\'',unit:'Unit 3',diff:'medium\'',stem:'A photograph of a street in Lagos, Nigeria shows a mosque, a church, market stalls selling both traditional crafts and imported electronics, billboards in English and Yoruba, and a woman in traditional dress using a smartphone. What types of geographic information does this image provide?',options:['Only physical geographic information about climate and natural resources\'','Only economic information about market activity and trade\'','Evidence of religious pluralism, linguistic geography, economic globalization, and the coexistence of traditional and modern cultural practices — multiple geographic processes visible in a single cultural landscape\'','Only political geographic information about Nigeria\'s colonial history'],answer:2,exp:'This photograph encodes multiple cultural landscape elements: the mosque and church show religious diffusion and pluralism; bilingual signage shows language geography; imported electronics show globalization; traditional crafts alongside smartphones show acculturation. A single street scene can make multiple geographic arguments simultaneously.'},
  {sub:'4.C\'',unit:'Unit 5',diff:'medium\'',stem:'An aerial photo of rural France shows long narrow rectangular fields running perpendicular to a river. An aerial photo of the American Midwest shows a perfectly square grid of equal fields. Which conclusion is best supported by comparing these images?',options:['French farms are more productive than American farms because they have river access\'','The contrasting field shapes reflect different land survey systems: the French long-lot system versus the American township and range system — each encoding a different colonial land distribution method that persists visibly in the landscape centuries later\'','The grid pattern in the Midwest indicates that region was settled after France\'','Both regions use identical farming practices despite different field shapes'],answer:1,exp:'Field shape in aerial photography is one of the most reliable indicators of historical land survey systems. The French long-lot maximizes river frontage; the American township and range maximizes uniformity and ease of land sale. Both systems, created centuries ago, remain readable in the landscape today — a vivid illustration of sequent occupancy.'},
  {sub:'4.B\'',unit:'Unit 6',diff:'medium\'',stem:'A satellite image shows a metropolitan area with a dense cluster of tall buildings at the center, surrounded by progressively lower-density development, with industrial areas along rail corridors and large retail centers connected by a beltway highway. Which spatial pattern does this image most clearly show?',options:['The rank-size rule, showing that the city is correctly sized relative to surrounding smaller cities\'','A hybrid urban pattern with a legacy downtown core, sector-model industrial corridors along rail lines, and edge cities along the beltway — typical of 20th-century American cities\'','The Latin American city model, with elite housing along a commercial spine\'','A purely concentric zone pattern with no evidence of sector or multiple nuclei development'],answer:1,exp:'The satellite image contains visual evidence of multiple urban models simultaneously: the dense core (concentric zone), industrial sectors along rail lines (Hoyt sector model), and edge cities on the beltway (galactic/peripheral model). This hybrid is characteristic of large American cities that developed across multiple transportation eras.'},
  {sub:'4.D\'',unit:'Unit 4',diff:'medium\'',stem:'Map A shows Africa\'s national boundaries with straight lines cutting across the continent. Map B shows the same continent with pre-colonial ethnic and linguistic regions overlaid. Comparing these two maps, which geographic process do they most effectively illustrate?',options:['The natural formation of national boundaries along rivers and mountain ranges\'','The mismatch between superimposed colonial boundaries (Map A) and pre-existing cultural and ethnic geographies (Map B) — a spatial pattern that explains many of Africa\'s contemporary political conflicts\'','The effectiveness of African governments in managing diverse populations within colonial boundaries\'','The rank-size distribution of cities across Africa'],answer:1,exp:'Comparing these two maps is one of the most powerful visual exercises in political geography: the straight-line colonial borders slice through ethnic territories visible in the cultural map, creating states with deeply divided populations — the legacy of the 1884-85 Berlin Conference.'},
  {sub:'4.F\'',unit:'Unit 7',diff:'medium\'',stem:'A photographer documents a new Chinese factory in Vietnam with images of modern machinery, clean facilities, and workers in uniforms. A news organization uses these images as evidence that foreign direct investment is improving labor conditions. What is the most significant limitation of using these photographs for this conclusion?',options:['Photographs of factories are always staged and therefore worthless as evidence\'','The photographs capture a single facility at one point in time under controlled conditions; they cannot show wage levels, working hours, labor rights, or conditions in smaller supplier factories\'','The photographs are too recent to be useful for geographic analysis\'','Factory conditions are determined entirely by government policy, not by investor choices'],answer:1,exp:'Visual sources have critical limitations: they show surface appearances at one moment in one controlled location. A clean factory tells us nothing about wages, hours worked, union rights, or conditions at upstream supplier factories. Geographic conclusions require multiple data types beyond single carefully selected visual snapshots.'},
  {sub:'4.E\'',unit:'Unit 3',diff:'medium\'',stem:'A photograph shows a South Korean city street with a McDonald\'s next to a traditional tea house, K-pop posters alongside traditional hanbok clothing advertisements, and young people dressed in both Western and traditional styles. Which geographic process does this image most directly illustrate?',options:['Cultural imperialism — Western culture is completely replacing Korean culture\'','Acculturation — Korean society is adopting elements of global culture while simultaneously maintaining its own cultural identity, resulting in cultural coexistence rather than full replacement\'','Assimilation — Korean people have fully adopted Western cultural practices\'','Relocation diffusion — Western culture spread to Korea through migration of Western people'],answer:1,exp:'The photograph shows coexistence, not replacement: Western fast food alongside traditional tea culture; K-pop (a Korean adaptation of Western music) alongside traditional clothing. This visual evidence of cultural blending without full replacement is the defining landscape expression of acculturation.'},
  {sub:'4.C\'',unit:'Unit 2',diff:'medium\'',stem:'Population pyramids from 1950, 1975, 2000, and 2025 for the same country show a progression from a wide-base triangle to a shape more like a rectangle with a slightly narrowing top. Which trend do these images most clearly show?',options:['The country\'s population declined dramatically between 1950 and 2025 due to emigration\'','The country underwent a demographic transition: falling birth rates narrowed the base over time while declining death rates allowed more people to survive to older ages — movement from Stage 2 toward Stage 4 of the DTM\'','The pyramids show the country experienced significant immigration after 2000','The rectangular 2025 pyramid indicates the country has entered Stage 5 with negative population growth'],answer:1,exp:'The progressive transformation from a wide-base triangle (high fertility/mortality, young population) to a rectangle (low fertility/mortality, even age distribution) is the visual signature of the demographic transition. This is the visual story of the DTM across time.'},
  {sub:'4.A\'',unit:'Unit 5',diff:'medium\'',stem:'An image shows terraced hillside fields in Southeast Asia carved into steep mountain slopes, with water-filled rice paddies at multiple levels. What types of geographic information can be directly read from this image?',options:['Only soil type and mineral composition of the hillside\'','Evidence of intensive agriculture, human modification of physical environment to overcome topographic constraints, a humid climate implied by flooded terraces, and a cultural tradition of hillside terrace farming — both physical and human geographic information\'','Only information about water management technology in the region\'','Only the elevation of the land and surrounding climate patterns'],answer:1,exp:'This image yields multiple geographic information types: the terraces show human modification of topography (possibilism); flooded paddies indicate wet rice cultivation (intensive agriculture); the hillside location suggests land pressure requiring marginal land use; and the construction technique reflects centuries of cultural adaptation.'},
  {sub:'4.F\'',unit:'Unit 6',diff:'hard\'',stem:'A geographer uses 1950s and 1960s photographs to study urban renewal policy effects in American cities. What is the most significant limitation of relying primarily on these photographs?',options:['Photographs from the 1950s are too old to provide useful geographic information\'','Historical photographs typically documented official renewal projects and newly constructed buildings rather than demolished neighborhoods and displaced communities — they reflect planners\' perspectives rather than residents\' experiences, creating systematic bias in the visual record\'','Photographs cannot accurately show urban areas because cities change too rapidly\'','Only satellite images can accurately document urban change over time'],answer:1,exp:'Visual source bias is a critical limitation: official documentation captured project successes while ignoring what was destroyed — communities, affordable housing, and social networks. Historical photographs often reflect the power and perspective of those who commissioned them, not those most affected.'},
 ]
},
{id:'SK5',num:5,name:'Scale Analysis\'',color:'#534AB7',bg:'#EEEDFE\'',
 desc:'Analyze geographic concepts and processes across multiple scales. Compare patterns at different scales. Evaluate how scale affects what we observe and conclude.',
 subskills:'5.A Identify scales · 5.B Explain cross-scale relationships · 5.C Compare across scales · 5.D Evaluate model effectiveness across scales\'',
 qs:[
  {sub:'5.B\'',unit:'Unit 2',diff:'medium\'',stem:'How does the same rural Mexico-to-Chicago migration process look different when analyzed at local, national, and global scales?',options:['At all three scales, the pattern looks identical — migration is migration regardless of scale\'','At the local scale, migration appears as a specific neighborhood receiving immigrants; at the national scale, it appears as a cross-border flow; at the global scale, it reflects the core-periphery economic relationship driving labor migration from a lower-wage periphery nation to a higher-wage core nation — each scale reveals different causes and consequences\'','The global scale analysis is always more accurate than local or national scale analysis\'','Migration can only be meaningfully studied at the national scale'],answer:1,exp:'Scale of analysis fundamentally changes what you observe: local scale shows neighborhood demographics; national scale shows the Mexico-US migration corridor; global scale reveals world-systems dynamics — wage differentials between core and periphery nations driving labor flows. No single scale gives the complete picture.'},
  {sub:'5.C\'',unit:'Unit 5',diff:'hard\'',stem:'Compare the characteristics of food insecurity at the global scale versus the local neighborhood scale within a wealthy country like the United States.',options:['Food insecurity looks identical at both scales — it is always caused by insufficient food production\'','At the global scale, food insecurity appears as a production and distribution problem concentrated in sub-Saharan Africa and South Asia; at the local scale within wealthy countries, food insecurity appears as an access and affordability problem — food deserts where calorie-dense food is abundant but fresh produce is unavailable\'','Food insecurity only exists at the global scale; within wealthy countries there is no food insecurity\'','The local scale always shows more food insecurity than the global scale'],answer:1,exp:'Scale reveals completely different dimensions of the same problem. Globally, food insecurity looks like insufficient production/distribution. Locally within the US, food insecurity is an access problem — not a calorie shortage but a nutritious food shortage in low-income neighborhoods. Same concept, entirely different geographic causes at different scales.'},
  {sub:'5.A\'',unit:'Unit 4',diff:'medium\'',stem:'A researcher is studying the impact of the European Union on economic development. Which scales of analysis are simultaneously present in this research topic?',options:['Only the global scale, since the EU affects world trade\'','The local scale (individual firms and workers), the national scale (member states\' economies), the regional scale (the EU as a supranational region), and the global scale (the EU\'s role in world trade) — this topic inherently operates across all four scales simultaneously\'','Only the national scale, since the EU is made up of member states\'','Only the regional scale, since the EU is a regional organization'],answer:1,exp:'The EU operates simultaneously at multiple scales: local (a French dairy farmer affected by EU subsidies), national (Germany\'s trade balance shaped by the single market), regional (the EU as a supranational political-economic region), and global (one of the world\'s three largest trading blocs). This multi-scalar nature is what makes supranational organizations geographically complex.'},
  {sub:'5.D\'',unit:'Unit 6',diff:'hard\'',stem:'How effectively does the concentric zone model explain urban structure at the neighborhood scale versus the metropolitan scale?',options:['The concentric zone model works equally well at both scales\'','At the metropolitan scale, the model\'s general gradient (decreasing density and increasing income with distance from CBD) often holds as a broad approximation; at the neighborhood scale, the model fails to capture the complex mosaic of land uses — far more heterogeneity than the model\'s smooth rings predict\'','The concentric zone model is only useful at the neighborhood scale\'','The model works better at the neighborhood scale because it was developed through observation of individual city blocks'],answer:1,exp:'Scale matters enormously for model applicability. The concentric zone model was designed for metropolitan-scale patterns, and at that scale the general gradient can be roughly observed. But at the neighborhood scale, land use is far more varied and patchy than clean rings suggest — reflecting complex micro-geographies of history, investment, and community change.'},
  {sub:'5.B\'',unit:'Unit 3',diff:'medium\'',stem:'The spread of Islam can be analyzed at multiple geographic scales. Which statement best explains the cross-scale relationships in this diffusion process?',options:['Islam\'s spread can only be meaningfully analyzed at the global scale because it is a world religion\'','At the global scale, Islam spread through trade networks and conquest from its Arabian hearth; at the regional scale, specific kingdoms and trade routes shaped which areas converted; at the local scale, mosques, schools, and community networks sustained the faith — diffusion operated simultaneously at all three scales with each level influencing the others\'','Religious diffusion always operates only at the local scale through personal conversion\'','The global scale pattern of Islam\'s spread fully explains all local and regional variations'],answer:1,exp:'Religious diffusion is inherently multi-scalar: global trade and conquest created the macro-level spread pattern; regional political decisions shaped intermediate patterns; local institutions (mosques, madrassas, family networks) sustained faith community-by-community. Full geographic understanding requires analysis at all three scales simultaneously.'},
  {sub:'5.C\'',unit:'Unit 7',diff:'hard\'',stem:'Compare the characteristics of deindustrialization at the global scale versus the local scale in a city like Detroit, Michigan.',options:['Deindustrialization looks the same at both scales — factories closing everywhere simultaneously\'','At the global scale, deindustrialization appears as a geographic shift of manufacturing from high-wage core nations to lower-wage semi-periphery and periphery nations; at the local scale in Detroit, it appears as plant closures, rising unemployment, population loss, and abandoned buildings — the human and landscape consequences of a global economic process\'','Detroit\'s deindustrialization was caused only by local management failures with no connection to global economic patterns\'','The global scale shows more deindustrialization than the local scale'],answer:1,exp:'This scale comparison is fundamental: globally, deindustrialization is a geographic redistribution of manufacturing (core-periphery dynamic). Locally in Detroit, it manifests as specific landscape abandonment and social crisis. The same global process produces dramatically different appearances at different scales — and the local scale reveals human consequences that aggregate global data conceals.'},
  {sub:'5.A\'',unit:'Unit 2',diff:'medium\'',stem:'A geographer studying fertility decline in India identifies: a global-scale shift toward women\'s education and empowerment; a national-scale government family planning program; and a local-scale village health worker program. Which correctly identifies the scales present?',options:['Only the national scale is relevant because family planning is a government policy\'','All three scales are simultaneously present and interacting: global (international development norms), national (India\'s government policy), and local (village-level implementation) — demographic change operates through all three scales at once\'','The local scale is most important because fertility decisions are made by individual families\'','The global scale overrides national and local scales in explaining fertility decline'],answer:1,exp:'Demographic change operates simultaneously at multiple scales that interact: global norms create cultural context; national policy creates programs and targets; local health workers implement change in communities. Identifying which scales are operating (Skill 5.A) is the first step in multi-scalar geographic analysis.'},
  {sub:'5.D\'',unit:'Unit 4',diff:'hard\'',stem:'To what extent does the nation-state model effectively explain political organization at the global scale versus the local scale?',options:['The nation-state model works perfectly at both scales\'','At the global scale, the nation-state model provides a useful framework — the world is organized into approximately 195 sovereign states — but at the local scale, it fails to capture that most states are multinational and that local ethnic and linguistic identities cut across state boundaries\'','The nation-state model only works at the local scale\'','The nation-state model has been entirely replaced by supranationalism'],answer:1,exp:'Scale reveals the model\'s limitations: at the global scale, the nation-state system provides a workable organizing framework (193 UN member states). But at the local scale — within cities, regions, and border zones — the model\'s assumption of cultural homogeneity breaks down. Most states contain internal cultural diversity the model\'s clean boundaries cannot capture.'},
  {sub:'5.C\'',unit:'Unit 6',diff:'medium\'',stem:'Compare the characteristics of urbanization at the global scale (comparing world regions) versus the metropolitan scale (comparing neighborhoods within a single city).',options:['Urbanization looks identical at both the global and metropolitan scales\'','At the global scale, urbanization reveals regional patterns: high urbanization in North America and Europe versus lower rates in sub-Saharan Africa and South Asia; at the metropolitan scale, urbanization reveals internal differentiation — dense cores, suburban rings, edge cities, and informal settlements within a single urban area\'','Global-scale urbanization data is always more accurate than metropolitan-scale data\'','The metropolitan scale shows higher urbanization rates than the global scale'],answer:1,exp:'Urbanization analyzed globally shows which world regions are most urban vs. rural. Within a single metropolitan area, urbanization describes internal differentiation — the uneven geography of density, land use, income, and infrastructure across neighborhoods. The same concept reveals completely different spatial patterns depending on scale of analysis.'},
  {sub:'5.B\'',unit:'Unit 5',diff:'hard\'',stem:'How did the Green Revolution\'s effects differ at the global, national, and local scales in South Asia?',options:['The Green Revolution had identical effects at all three scales — it simply increased food production everywhere equally\'','At the global scale, the Green Revolution prevented predicted famines; at the national scale in India, it transformed Punjab into a grain-exporting region; at the local scale, it increased inequality between large farmers who could afford HYV inputs and small farmers who were marginalized — the same intervention had very different consequences at different scales\'','The Green Revolution only had effects at the global scale; national and local impacts were negligible\'','The local scale effects of the Green Revolution were more positive than the global scale effects'],answer:1,exp:'The Green Revolution\'s multi-scalar analysis is definitive: Globally — averted famine. Nationally — transformed India from food importer to exporter. Locally — deepened rural inequality: wealthy farmers with capital gained most; poor farmers who could not afford HYV inputs were often displaced. The same policy produced dramatically different outcomes at each scale.'},
 ]
}
];

// ── STATE ──
let PROG={};
try{PROG=JSON.parse(localStorage.getItem('aphg_v3')||'{}')}catch{}
function saveProg(){try{localStorage.setItem('aphg_v3',JSON.stringify(PROG))}catch{}}
function markKnown(uid,idx,val){if(!PROG[uid])PROG[uid]={known:{}};PROG[uid].known[idx]=val;saveProg();}
function isKnown(uid,idx){return!!(PROG[uid]&&PROG[uid].known[idx])}
function knownCount(uid){const u=UNITS.find(x=>x.id===uid);if(!u)return 0;return u.concepts.filter((_,i)=>isKnown(uid,i)).length}
function totalKnown(){return UNITS.reduce((s,u)=>s+knownCount(u.id),0)}
function totalTerms(){return UNITS.reduce((s,u)=>s+u.concepts.length,0)}

let currentUnit=null,currentMode='concepts',fcIndex=0,fcCards=[],fcFlipped=false;
let mcIndex=0,mcAnswered=false,mcScore=0,mcQuestions=[],mcFilter='all';
let examAll=[],examIndex=0,examAnswered=false,examScore=0;
let currentSkill=null,skIndex=0,skAnswered=false,skScore=0,skQuestions=[];

// ── SKILLS SCORE STORAGE ──
function getSkillScore(sid){try{return JSON.parse(localStorage.getItem('sk_'+sid)||'null')||{correct:0,total:0,pct:0}}catch{return{correct:0,total:0,pct:0}}}
function saveSkillScore(sid,c,t){try{localStorage.setItem('sk_'+sid,JSON.stringify({correct:c,total:t,pct:t?Math.round(c/t*100):0}))}catch{}}

// ── SHOW/HIDE HELPERS ──
function showOnly(id){
  ['view-home','view-unit','view-exam','view-skills'].forEach(v=>{
    document.getElementById(v).style.display=(v===id?'block':'none');
  });
}

// ── HOME ──
function renderHome(){
  showOnly('view-home');
  const tk=totalKnown(),tt=totalTerms(),pct=tt?Math.round(tk/tt*100):0;
  document.getElementById('view-home').innerHTML=`
    <div class="overall-progress">
      <div class="pb-label"><span>Overall progress</span><span>${tk} / ${tt} terms marked as known</span></div>
      <div class="pb-track"><div class="pb-fill" style="width:${pct}%"></div></div>
    </div>
    <p class="home-intro">Select a unit to study, or use Full Exam Mode or Skill Practice from the header.</p>
    <div class="unit-grid">
      ${UNITS.map(u=>{
        const kc=knownCount(u.id),tc=u.concepts.length,up=tc?Math.round(kc/tc*100):0;
        return `<div class="unit-card" onclick="openUnit(${u.id})">
          <div class="u-num">Unit ${u.id}</div>
          <div class="u-title">${u.title}</div>
          <div class="u-meta">${tc} terms &middot; ${u.mcqs.length} questions &middot; ${u.frqs.length} FRQs</div>
          <span class="u-weight" style="background:${u.bg};color:${u.color}">${u.weight} of exam</span>
          <div class="u-prog-row"><span>${kc}/${tc} terms known</span><span>${up}%</span></div>
          <div class="u-prog-bar"><div class="u-prog-fill" style="width:${up}%"></div></div>
        </div>`;
      }).join('')}
    </div>`;
}

// ── UNIT ──
function openUnit(id){
  currentUnit=UNITS.find(u=>u.id===id);
  currentMode='concepts';
  fcCards=[];fcIndex=0;fcFlipped=false;
  mcQuestions=[];mcIndex=0;mcAnswered=false;mcScore=0;mcFilter='all';
  showOnly('view-unit');
  renderUnit();
}
function renderUnit(){
  const u=currentUnit;
  document.getElementById('view-unit').innerHTML=`
    <button class="back-btn" onclick="renderHome()">&#8592; All Units</button>
    <div class="unit-header">
      <h2>Unit ${u.id}: ${u.title}</h2>
      <p>${u.desc}</p>
    </div>
    <div class="mode-tabs">
      <div class="mode-tab ${currentMode==='concepts'?'active':''}" onclick="setMode('concepts')">Concept Review</div>
      <div class="mode-tab ${currentMode==='flashcards'?'active':''}" onclick="setMode('flashcards')">Flashcards</div>
      <div class="mode-tab ${currentMode==='mcq'?'active':''}" onclick="setMode('mcq')">Practice Questions</div>
      <div class="mode-tab ${currentMode==='frq'?'active':''}" onclick="setMode('frq')">FRQ Prompts</div>
    </div>
    <div id="mode-content"></div>`;
  renderMode();
}
function setMode(m){if(m==='mcq'){mcQuestions=[];mcIndex=0;mcAnswered=false;mcScore=0;}currentMode=m;renderUnit();}
function renderMode(){
  const el=document.getElementById('mode-content');
  if(currentMode==='concepts')renderConcepts(el);
  else if(currentMode==='flashcards')renderFlashcards(el);
  else if(currentMode==='mcq')renderMCQ(el);
  else if(currentMode==='frq')renderFRQ(el);
}

// ── CONCEPTS ──
function renderConcepts(el){
  const u=currentUnit,kc=knownCount(u.id);
  el.innerHTML=`<p class="concepts-summary">${kc} of ${u.concepts.length} terms marked as known</p>
    <div class="concept-list">${u.concepts.map((c,i)=>`
      <div class="concept-item ${isKnown(u.id,i)?'known':''}">
        <div class="c-topic">${c.topic}</div>
        <div class="c-term-row">
          <div class="c-term">${c.term}</div>
          <button class="know-btn ${isKnown(u.id,i)?'active':''}" onclick="toggleKnown(${u.id},${i},event)">${isKnown(u.id,i)?'Known ✓':'Mark Known'}</button>
        </div>
        <div class="c-def">${c.def}</div>
      </div>`).join('')}</div>`;
}
function toggleKnown(uid,idx,e){e.stopPropagation();markKnown(uid,idx,!isKnown(uid,idx));renderMode();}

// ── FLASHCARDS ──
function renderFlashcards(el){
  const u=currentUnit;
  if(!fcCards.length||fcCards[0]._uid!==u.id){fcCards=u.concepts.map((c,i)=>({...c,_uid:u.id,_idx:i}));fcIndex=0;fcFlipped=false;}
  const card=fcCards[fcIndex];
  el.innerHTML=`<div class="fc-container">
    <div class="fc-top-row">
      <span class="fc-progress">${fcIndex+1} / ${fcCards.length}</span>
      <button class="fc-shuffle" onclick="shuffleFC()">Shuffle</button>
    </div>
    <div class="fc-card-wrap">
      <div class="fc-card ${fcFlipped?'flipped':''}" id="fc-card" onclick="flipCard()">
        <div class="fc-face front">
          <div class="fc-label">Term</div>
          <div class="fc-word">${card.term}</div>
          <div class="fc-topic-lbl">${card.topic}</div>
        </div>
        <div class="fc-face back">
          <div class="fc-label">Definition</div>
          <div class="fc-def-text">${card.def}</div>
        </div>
      </div>
    </div>
    <span class="fc-hint">Tap the card to reveal the definition</span>
    ${fcFlipped?`<div class="fc-know-row">
      <button class="fc-know" onclick="fcMark(true)">I know this &#10003;</button>
      <button class="fc-still" onclick="fcMark(false)">Still learning</button>
    </div>`:''}
    <div class="fc-nav">
      <button class="fc-btn" onclick="prevFC()" ${fcIndex===0?'disabled':''}>&#8592; Prev</button>
      <button class="fc-btn" onclick="nextFC()" ${fcIndex===fcCards.length-1?'disabled':''}>Next &#8594;</button>
    </div>
  </div>`;
}
function flipCard(){fcFlipped=!fcFlipped;const c=document.getElementById('fc-card');if(c)c.classList.toggle('flipped',fcFlipped);}
function prevFC(){if(fcIndex>0){fcIndex--;fcFlipped=false;renderMode();}}
function nextFC(){if(fcIndex<fcCards.length-1){fcIndex++;fcFlipped=false;renderMode();}}
function shuffleFC(){for(let i=fcCards.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[fcCards[i],fcCards[j]]=[fcCards[j],fcCards[i]];}fcIndex=0;fcFlipped=false;renderMode();}
function fcMark(val){const card=fcCards[fcIndex];markKnown(card._uid,card._idx,val);if(fcIndex<fcCards.length-1){fcIndex++;fcFlipped=false;}renderMode();}

// ── MCQ ──
function renderMCQ(el){
  const u=currentUnit;
  if(!mcQuestions.length){
    const pool=mcFilter==='hard'?u.mcqs.filter(q=>q.diff==='hard'):mcFilter==='medium'?u.mcqs.filter(q=>q.diff==='medium'):u.mcqs;
    mcQuestions=[...pool];
    for(let i=mcQuestions.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[mcQuestions[i],mcQuestions[j]]=[mcQuestions[j],mcQuestions[i]];}
    mcIndex=0;mcAnswered=false;mcScore=0;
  }
  if(!mcQuestions.length){el.innerHTML=`<p style="color:var(--txt2);font-size:13px;padding:1rem 0">No questions match this filter.</p>`;return;}
  if(mcIndex>=mcQuestions.length){
    const pct=Math.round(mcScore/mcQuestions.length*100);
    el.innerHTML=`<div class="mc-done">
      <div class="score-big">${mcScore}/${mcQuestions.length}</div>
      <div class="score-label">${pct}% &mdash; ${pct>=80?'Excellent work!':pct>=60?'Keep reviewing!':'More practice needed.'}</div>
      <button class="mc-restart" onclick="restartMCQ()">Try Again</button>
      <button class="mc-restart" onclick="setMode('mcq')">Change Filter</button>
    </div>`;return;
  }
  const q=mcQuestions[mcIndex];
  el.innerHTML=`<div class="mc-container">
    <div class="filter-row">
      <span class="filter-lbl">Difficulty:</span>
      <button class="filter-btn ${mcFilter==='all'?'active':''}" onclick="setMCFilter('all')">All 20</button>
      <button class="filter-btn ${mcFilter==='medium'?'active':''}" onclick="setMCFilter('medium')">Standard (10)</button>
      <button class="filter-btn ${mcFilter==='hard'?'active':''}" onclick="setMCFilter('hard')">Challenging (10)</button>
    </div>
    <div class="mc-header-row">
      <span>Question ${mcIndex+1} of ${mcQuestions.length}</span>
      <span>Score: ${mcScore}/${mcIndex}</span>
    </div>
    <div class="mc-q">
      <div class="mc-meta">
        <span class="mc-topic-lbl">Topic ${q.topic}</span>
        <span class="diff-badge ${q.diff==='hard'?'diff-hard':'diff-med'}">${q.diff==='hard'?'Challenging':'Standard'}</span>
      </div>
      <div class="mc-stem">${q.stem}</div>
      <div class="mc-options">${q.options.map((o,i)=>`
        <div class="mc-opt" id="opt-${i}" onclick="answerMCQ(${i})">${String.fromCharCode(65+i)}. ${o}</div>`).join('')}</div>
      <div id="mc-explanation" class="mc-exp"></div>
    </div>
    <button class="mc-next-btn" id="mc-next" onclick="nextMCQ()">Next &#8594;</button>
  </div>`;
}
function setMCFilter(f){mcFilter=f;mcQuestions=[];mcIndex=0;mcAnswered=false;mcScore=0;renderMode();}
function answerMCQ(chosen){
  if(mcAnswered)return;mcAnswered=true;
  const q=mcQuestions[mcIndex];
  document.querySelectorAll('.mc-opt').forEach(o=>o.classList.add('answered'));
  document.getElementById('opt-'+q.answer).classList.add('correct');
  if(chosen===q.answer)mcScore++;
  else document.getElementById('opt-'+chosen).classList.add('wrong');
  const exp=document.getElementById('mc-explanation');
  if(exp){exp.style.display='block';exp.textContent=q.exp;}
  const nb=document.getElementById('mc-next');if(nb)nb.style.display='block';
}
function nextMCQ(){mcIndex++;mcAnswered=false;renderMode();}
function restartMCQ(){mcIndex=0;mcAnswered=false;mcScore=0;mcQuestions=[];renderMode();}

// ── FRQ ──
function renderFRQ(el){
  const u=currentUnit;
  el.innerHTML=`<div class="frq-list">${u.frqs.map((f,fi)=>`
    <div class="frq-item">
      <div class="frq-type">${f.type}</div>
      <div class="frq-prompt">${f.prompt}</div>
      <button class="frq-toggle" onclick="toggleGuide(${fi})">Show scoring guide</button>
      <div id="frq-guide-${fi}" class="frq-guide">
        ${f.guide.map(g=>`<div class="pts-block"><div class="pts-label">Point${g.pts>1?'s':''} (${g.pts})</div>${g.text}</div>`).join('')}
        <div class="frq-total">Total possible: ${f.guide.reduce((s,g)=>s+g.pts,0)} points</div>
      </div>
    </div>`).join('')}</div>`;
}
function toggleGuide(fi){
  const el=document.getElementById('frq-guide-'+fi);
  const btn=el.previousElementSibling;
  const open=el.style.display==='block';
  el.style.display=open?'none':'block';
  btn.textContent=open?'Show scoring guide':'Hide scoring guide';
}

// ── FULL EXAM ──
function openFullExam(){
  examAll=[];examIndex=0;examAnswered=false;examScore=0;
  UNITS.forEach(u=>u.mcqs.forEach(q=>examAll.push({...q,_unit:u.id,_unitTitle:u.title,_color:u.color,_bg:u.bg})));
  for(let i=examAll.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[examAll[i],examAll[j]]=[examAll[j],examAll[i]];}
  showOnly('view-exam');
  const hard=examAll.filter(q=>q.diff==='hard').length;
  document.getElementById('view-exam').innerHTML=`
    <button class="back-btn" onclick="renderHome()">&#8592; Back to Units</button>
    <div class="exam-landing">
      <h2>Full Exam Review Mode</h2>
      <p>${examAll.length} questions from all 7 units, randomly shuffled.</p>
      <p class="sub">${examAll.length-hard} standard + ${hard} challenging questions</p>
      <button class="exam-start-btn" onclick="renderExamQ()">Start Exam &#8594;</button>
    </div>`;
}
function renderExamQ(){
  const el=document.getElementById('view-exam');
  if(examIndex>=examAll.length){
    const pct=Math.round(examScore/examAll.length*100);
    el.innerHTML=`
      <button class="back-btn" onclick="renderHome()">&#8592; Home</button>
      <div class="mc-done">
        <div class="score-big">${examScore}/${examAll.length}</div>
        <div class="score-label">${pct}% &mdash; ${pct>=80?'Excellent!':pct>=60?'Good effort!':'More study needed.'}</div>
        <div style="margin-top:1.5rem">
          <button class="mc-restart" onclick="openFullExam()">New Exam</button>
          <button class="mc-restart" onclick="renderHome()">Back to Units</button>
        </div>
      </div>`;return;
  }
  const q=examAll[examIndex];
  const pct=Math.round(examIndex/examAll.length*100);
  el.innerHTML=`
    <button class="back-btn" onclick="renderHome()">&#8592; Home</button>
    <div style="margin-bottom:1rem">
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--txt2);margin-bottom:6px">
        <span>Question ${examIndex+1} of ${examAll.length}</span>
        <span>Score: ${examScore}/${examIndex}</span>
      </div>
      <div class="pb-track"><div class="pb-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="mc-q">
      <div class="mc-meta">
        <span class="mc-topic-lbl">Topic ${q.topic}</span>
        <span class="exam-unit-badge" style="background:${q._bg};color:${q._color}">Unit ${q._unit}</span>
        <span class="diff-badge ${q.diff==='hard'?'diff-hard':'diff-med'}">${q.diff==='hard'?'Challenging':'Standard'}</span>
      </div>
      <div class="mc-stem">${q.stem}</div>
      <div class="mc-options">${q.options.map((o,i)=>`
        <div class="mc-opt" id="eopt-${i}" onclick="answerExam(${i})">${String.fromCharCode(65+i)}. ${o}</div>`).join('')}</div>
      <div id="exam-exp" class="mc-exp"></div>
    </div>
    <button class="mc-next-btn" id="exam-next" onclick="nextExam()">Next &#8594;</button>`;
}
function answerExam(chosen){
  if(examAnswered)return;examAnswered=true;
  const q=examAll[examIndex];
  document.querySelectorAll('.mc-opt').forEach(o=>o.classList.add('answered'));
  document.getElementById('eopt-'+q.answer).classList.add('correct');
  if(chosen===q.answer)examScore++;
  else document.getElementById('eopt-'+chosen).classList.add('wrong');
  const exp=document.getElementById('exam-exp');
  if(exp){exp.style.display='block';exp.textContent=q.exp;}
  const nb=document.getElementById('exam-next');if(nb)nb.style.display='block';
}
function nextExam(){examIndex++;examAnswered=false;renderExamQ();}

// ── SKILL PRACTICE ──
function openSkillsView(){
  showOnly('view-skills');
  const el=document.getElementById('view-skills');
  el.innerHTML=`
    <button class="back-btn" onclick="renderHome()">&#8592; All Units</button>
    <div class="unit-header">
      <h2>AP Course Skill Practice</h2>
      <p>The AP exam tests 5 skill categories. Practice each one with 10 targeted questions drawn from Units 2-7 content.</p>
    </div>
    <div class="skills-grid">
      ${SKILLS.map(sk=>{
        const sc=getSkillScore(sk.id);
        const up=sc.total?sc.pct:0;
        return `<div class="skill-card" onclick="openSkillDetail('${sk.id}')">
          <div class="sk-num">Skill Category ${sk.num}</div>
          <div class="sk-name">${sk.name}</div>
          <div class="sk-desc">${sk.desc}</div>
          <span class="sk-badge" style="background:${sk.bg};color:${sk.color}">${sk.qs.length} questions</span>
          <div class="sk-prog-row">
            <span>${sc.total?'Last score: '+sc.correct+'/'+sc.total+' ('+sc.pct+'%)':'Not yet attempted'}</span>
          </div>
          <div class="sk-prog-bar"><div class="sk-prog-fill" style="width:${up}%"></div></div>
        </div>`;
      }).join('')}
    </div>`;
}
function openSkillDetail(sid){
  currentSkill=SKILLS.find(s=>s.id===sid);
  skQuestions=[...currentSkill.qs];
  for(let i=skQuestions.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[skQuestions[i],skQuestions[j]]=[skQuestions[j],skQuestions[i]];}
  skIndex=0;skAnswered=false;skScore=0;
  renderSkillQ();
}
function renderSkillQ(){
  const sk=currentSkill;
  const el=document.getElementById('view-skills');
  if(skIndex>=skQuestions.length){
    saveSkillScore(sk.id,skScore,skQuestions.length);
    const pct=Math.round(skScore/skQuestions.length*100);
    el.innerHTML=`
      <button class="back-btn" onclick="openSkillsView()">&#8592; All Skills</button>
      <div class="mc-done">
        <div class="score-big">${skScore}/${skQuestions.length}</div>
        <div class="score-label">${pct}% &mdash; ${pct>=80?'Excellent skill mastery!':pct>=60?'Good work!':'Review this skill area.'}</div>
        <div style="margin-top:1.5rem">
          <button class="mc-restart" onclick="openSkillDetail('${sk.id}')">Try Again</button>
          <button class="mc-restart" onclick="openSkillsView()">All Skills</button>
        </div>
      </div>`;
    return;
  }
  const q=skQuestions[skIndex];
  const pct=Math.round(skIndex/skQuestions.length*100);
  el.innerHTML=`
    <button class="back-btn" onclick="openSkillsView()">&#8592; All Skills</button>
    <div class="unit-header">
      <h2>${sk.name}</h2>
      <div class="sk-subskills">${sk.subskills}</div>
    </div>
    <div style="margin-bottom:.75rem">
      <div class="sk-score-row">
        <span>Question ${skIndex+1} of ${skQuestions.length}</span>
        <span>Score: ${skScore}/${skIndex}</span>
      </div>
      <div class="pb-track"><div class="pb-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="mc-q">
      <div class="mc-meta">
        <span class="mc-topic-lbl">Skill ${q.sub}</span>
        <span class="exam-unit-badge" style="background:${sk.bg};color:${sk.color}">${q.unit}</span>
        <span class="diff-badge ${q.diff==='hard'?'diff-hard':'diff-med'}">${q.diff==='hard'?'Challenging':'Standard'}</span>
      </div>
      <div class="mc-stem">${q.stem}</div>
      <div class="mc-options">${q.options.map((o,i)=>`
        <div class="mc-opt" id="skopt-${i}" onclick="answerSkill(${i})">${String.fromCharCode(65+i)}. ${o}</div>`).join('')}</div>
      <div id="sk-exp" class="mc-exp"></div>
    </div>
    <button class="mc-next-btn" id="sk-next" onclick="nextSkillQ()">Next &#8594;</button>`;
}
function answerSkill(chosen){
  if(skAnswered)return;skAnswered=true;
  const q=skQuestions[skIndex];
  document.querySelectorAll('.mc-opt').forEach(o=>o.classList.add('answered'));
  document.getElementById('skopt-'+q.answer).classList.add('correct');
  if(chosen===q.answer)skScore++;
  else document.getElementById('skopt-'+chosen).classList.add('wrong');
  const exp=document.getElementById('sk-exp');
  if(exp){exp.style.display='block';exp.textContent=q.exp;}
  const nb=document.getElementById('sk-next');if(nb)nb.style.display='block';
}
function nextSkillQ(){skIndex++;skAnswered=false;renderSkillQ();}

renderHome();
</script>
</body>
</html>
