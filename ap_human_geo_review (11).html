{topic:'3.8',diff:'hard',stem:'A small Pacific Island nation adopts English as official language, imports American fast food chains, and sees young people adopt Western clothing — while elders maintain traditional ceremonies. This best illustrates:',options:['Full cultural assimilation — the island culture is being replaced','Acculturation — Western elements are being adopted while traditional practices persist among some groups','Cultural imperialism with no local resistance','Syncretism — a new hybrid culture combining Western and traditional elements'],answer:1,exp:'Acculturation involves adopting elements of another culture while retaining aspects of the original. The key indicator here is the coexistence of new and traditional practices across generations — not replacement (assimilation) or resistance (nativism), but selective adoption alongside cultural continuity.'},
{topic:'3.3',diff:'hard',stem:'Languages like Haitian Creole and Tok Pisin (Papua New Guinea) developed from pidgin languages into fully complex languages with native speakers. What does this reveal about language geography?',options:['Pidgin languages always disappear over time as one original language dominates','Languages can emerge from contact situations, becoming creolized with their own grammatical rules — showing that languages are dynamic cultural products shaped by migration and contact','Creole languages are inferior to their parent languages','The spread of creole languages is an example of hierarchical diffusion'],answer:1,exp:'Creolization shows that languages are not fixed cultural artifacts — they emerge from contact, migration, and cultural mixing. Haitian Creole developed from contact between French colonizers and enslaved Africans. Today it\'s a fully complex language with millions of native speakers — evidence of how colonial relocation diffusion created new cultural forms.'},
{topic:'3.6',diff:'hard',stem:'A geographer argues that globalization promotes cultural homogenization, while another argues it promotes cultural heterogenization (more diversity). Which evidence best supports the heterogenization argument?',options:['English is spreading as a global lingua franca, replacing minority languages','Global media companies like Netflix distribute content worldwide, spreading American cultural values','Local cultures are adapting global influences into unique hybrid forms (e.g., K-pop blending Korean and Western music) rather than simply replacing local traditions','The internet allows people to access any culture, erasing geographic cultural boundaries'],answer:2,exp:'Heterogenization (or glocalization) argues that as cultures interact, they create new hybrid forms rather than simply converging. K-pop is a strong example: it blends Korean language, aesthetics, and musical traditions with Western pop structures — creating something new, not simply replacing Korean culture with Western culture.'},
{topic:'3.7',diff:'hard',stem:'Christianity, Islam, and Buddhism all originated in Asia yet today have their largest concentrations of followers in other regions. What geographic process most directly explains their global spread?',options:['Stimulus diffusion — the core beliefs changed as they spread to new regions','Ethnic migration — followers always migrated together as ethnic groups','A combination of relocation diffusion (missionaries, traders, colonizers) and subsequent expansion diffusion within receiving regions','Contagious diffusion only — direct contact spread all three faiths'],answer:2,exp:'All three universalizing religions spread primarily through a two-stage process: relocation diffusion (missionaries, merchants, military conquest, colonization) carried them to new regions; then expansion diffusion within those regions built large concentrations. The hearth often saw the faith reduced as other religious movements countered.'},
{topic:'3.2',diff:'hard',stem:'A geographer visits two villages. Village A has a church, small family-owned fields, and English signs. Village B has a mosque, communal fields, and Arabic script on buildings. Without knowing the location, what can the geographer most reliably conclude?',options:['Village A is in North America; Village B is in the Middle East','Village A was influenced by European Christian colonialism; Village B was influenced by Arab Islamic cultural diffusion — but exact locations cannot be determined from landscape alone','Village A is more economically developed than Village B','Village B practices subsistence agriculture; Village A practices commercial agriculture'],answer:1,exp:'Cultural landscape reading: religious architecture, script, and field patterns reveal which cultural tradition shaped the landscape. However, these indicators can appear anywhere in the world (there are mosques in Detroit, churches in Nigeria), so the geographer can infer cultural influence but not specific location. Cultural landscapes reveal process (diffusion), not necessarily absolute location.'},
{topic:'3.5',diff:'hard',stem:'Colonial powers often replaced indigenous languages with European languages. Today, many formerly colonized nations use European languages as official languages. Which geographic concept does this most directly illustrate?',options:['Stimulus diffusion — the idea of "official language" spread even if the specific language changed','The long-term spatial impact of relocation diffusion, where colonial language spread persists as a relic of power relationships in the cultural landscape','Contagious diffusion — European languages spread through direct contact','Cultural imperialism with no lasting effects'],answer:1,exp:'Colonial language spread is a classic case of relocation diffusion whose effects persist long after the colonial power withdrew. English in Nigeria, French in Senegal, Spanish throughout Latin America are relics of colonial power in the cultural landscape — persisting long after political decolonization.'},
{topic:'3.8',diff:'hard',stem:'A country bans foreign films, requires all music to be performed in the national language, and restricts international social media platforms. What cultural geographic concept best describes this approach, and what concern is it responding to?',options:['Cultural imperialism — the government is imposing its culture on other nations','Nativism and resistance to cultural imperialism — the government is protecting its national culture from being overwhelmed by foreign (often Western) cultural dominance','Stimulus diffusion — the government is adapting foreign cultural forms to local contexts','Acculturation policy — the government is encouraging citizens to blend foreign and local cultures'],answer:1,exp:'This describes a nativist/protectionist response to perceived cultural imperialism. Countries like France, Iran, China, and Russia have implemented similar policies, arguing that unchecked globalization of culture (especially American media) threatens national identity and language.'},
{topic:'3.4',diff:'hard',stem:'The concept of democracy originated in ancient Athens but has spread worldwide — with each adopting country developing its own variant (parliamentary, presidential, constitutional monarchy). Which type of diffusion does this most precisely illustrate?',options:['Contagious diffusion — democracy spread through direct contact between neighboring states','Hierarchical diffusion — powerful states imposed democracy on weaker ones','Relocation diffusion — Greek emigrants carried democracy to new lands','Stimulus diffusion — the underlying principle of popular governance spread and was adapted into different systems in different cultural contexts'],answer:3,exp:'Stimulus diffusion is precise here: the original Athenian form did not spread intact. Instead, the underlying principle — that governments should derive legitimacy from the people — spread and was adapted into radically different forms. The stimulus (popular sovereignty) inspired diverse adaptations.'},
],
frqs:[
{type:'No Stimulus FRQ',prompt:'A. Define cultural diffusion.\nB. Compare relocation diffusion and expansion diffusion, explaining how each spreads cultural traits.\nC. Explain how colonialism served as a mechanism for cultural diffusion, using ONE specific example.',guide:[{pts:1,text:'A. Cultural diffusion: the spread of cultural traits, ideas, or innovations from one place or culture to another.'},{pts:2,text:'B. Relocation: cultural traits move WITH people as they migrate — the trait leaves the origin. Expansion: traits spread outward from a hearth while remaining strong at the source; subdivided into contagious, hierarchical, and stimulus types.'},{pts:2,text:'C. Colonialism forced cultural traits onto colonized peoples — language, religion, political systems. Example: British colonialism spread English and Christianity throughout South Asia and sub-Saharan Africa through settlement, missionary activity, and political control.'}]},
{type:'2-Stimulus FRQ',prompt:'The spread of universalizing religions has shaped cultural landscapes worldwide.\n\nA. Define "universalizing religion" and provide two examples.\nB. Explain the difference between a universalizing religion and an ethnic religion.\nC. Describe ONE way in which the spread of a universalizing religion has altered the cultural landscape of a region.',guide:[{pts:1,text:'A. Universalizing religion: seeks to appeal to all people globally, not tied to ethnicity. Examples: Christianity, Islam, Buddhism.'},{pts:1,text:'B. Ethnic religion is tied to a specific cultural or ethnic group (Hinduism, Judaism) and does not typically seek converts. Universalizing religions actively proselytize across cultures.'},{pts:2,text:'C. Example: Islam\'s spread across North Africa and the Middle East altered landscapes with mosques, minarets, and Arabic-script signage. Or: Christianity in Latin America produced cathedral architecture and religious festivals that persist in the cultural landscape today.'}]},
]},

{id:4,weight:'12–17%',title:'Political Patterns & Processes',desc:'Political geography, boundaries, forms of governance, devolution, sovereignty challenges, centrifugal and centripetal forces',color:'#993C1D',bg:'#FAECE7',
concepts:[
{topic:'4.4 Defining Political Boundaries',term:'Administered boundary',def:'A boundary that is actively controlled and enforced by government authorities with checkpoints, border patrols, and official crossing points.'},
{topic:'4.9 Challenges to Sovereignty',term:'African Union',def:'A supranational organization of 55 African member states founded in 2002 to promote political and economic integration, peace, and development across Africa.'},
{topic:'4.4 Defining Political Boundaries',term:'Antecedent boundary',def:'A boundary established before an area is heavily populated.'},
{topic:'4.9 Challenges to Sovereignty',term:'Arctic Council',def:'An intergovernmental forum of eight Arctic states promoting cooperation on environmental protection and sustainable development in the Arctic region.'},
{topic:'4.9 Challenges to Sovereignty',term:'ASEAN',def:'The Association of Southeast Asian Nations; a regional supranational organization of 10 Southeast Asian nations promoting economic integration, political cooperation, and regional security.'},
{topic:'4.8 Defining Devolutionary Factors',term:'Autonomous region',def:'A subdivision of a state with a degree of self-governance in certain policy areas while remaining part of the larger state. Example: Hong Kong within China; Catalonia within Spain.'},
{topic:'4.10 Centrifugal and Centripetal Forces',term:'Balkanization',def:'The fragmentation of a region into smaller, often hostile political units.'},
{topic:'4.10 Centrifugal and Centripetal Forces',term:'Centrifugal forces',def:'Forces that divide or destabilize a state — ethnic conflict, economic inequality, separatist movements.'},
{topic:'4.10 Centrifugal and Centripetal Forces',term:'Centripetal forces',def:'Forces that unify a state — shared language, religion, national identity, strong economy.'},
{topic:'4.3 Political Power and Territoriality',term:'Choke point',def:'A narrow strategically vital passage controlling access between larger geographic areas. Examples: Strait of Hormuz, Strait of Malacca, Suez Canal.'},
{topic:'4.5 The Function of Political Boundaries',term:'Colonialism',def:'The historical establishment of political and economic control by one country over foreign territories; a primary force shaping today\'s international political boundaries.'},
{topic:'4.4 Defining Political Boundaries',term:'Consequent boundary',def:'A boundary drawn to coincide with existing cultural, ethnic, linguistic, or religious divisions within an area. Example: the India-Pakistan boundary along the Hindu-Muslim religious divide at partition.'},
{topic:'4.10 Centrifugal and Centripetal Forces',term:'Cultural cohesion',def:'The degree to which a population shares common values, identity, language, and purpose; a key centripetal force that holds a state together.'},
{topic:'4.4 Defining Political Boundaries',term:'Defined boundary',def:'A boundary established by a legal document such as a treaty that describes in writing where the boundary is located.'},
{topic:'4.4 Defining Political Boundaries',term:'Delimited boundary',def:'A boundary drawn on a map by cartographers based on a legal definition; the visual representation of the defined boundary.'},
{topic:'4.4 Defining Political Boundaries',term:'Demarcated boundary',def:'A boundary physically marked on the landscape with fences, walls, signs, monuments, or other visible markers.'},
{topic:'4.3 Political Power and Territoriality',term:'Demilitarized zone',def:'An area from which military forces and weapons are prohibited by treaty or agreement. Example: the Korean DMZ between North and South Korea.'},
{topic:'4.7 Forms of Governance',term:'Democratization',def:'The transition process by which a political system moves from authoritarian rule toward democracy, with free elections, civil liberties, and rule of law.'},
{topic:'4.8 Defining Devolutionary Factors',term:'Devolution',def:'Transfer of power from central to regional governments. Driven by ethnic, linguistic, economic, or spatial factors.'},
{topic:'4.3 Political Power and Territoriality',term:'Enclave',def:'A territory completely surrounded by another state. Example: Lesotho (surrounded by South Africa).'},
{topic:'4.3 Political Power and Territoriality',term:'Established territorial seas',def:'The internationally recognized zone of ocean extending 12 nautical miles from a country\'s coastline over which the state exercises full sovereignty, established under UNCLOS.'},
{topic:'4.10 Centrifugal and Centripetal Forces',term:'Ethnic cleansing',def:'The systematic forced removal or elimination of an ethnic, religious, or racial group from a territory through violence, expulsion, or genocide.'},
{topic:'4.8 Defining Devolutionary Factors',term:'Ethnic nationalist',def:'A person or political movement advocating for a state organized around a single dominant ethnicity, often excluding or marginalizing minority groups.'},
{topic:'4.8 Defining Devolutionary Factors',term:'Ethnic separatism',def:'A political movement in which an ethnic group within a larger state seeks independence or greater autonomy based on distinct ethnic identity.'},
{topic:'4.8 Defining Devolutionary Factors',term:'Ethnonationalism',def:'A form of nationalism in which the nation is defined primarily by shared ethnicity; can drive both independence movements and persecution of ethnic minorities.'},
{topic:'4.9 Challenges to Sovereignty',term:'European Union',def:'A supranational political and economic union of 27 European member states with a single market, the euro, shared regulations, and free movement of people.'},
{topic:'4.3 Political Power and Territoriality',term:'Exclave',def:'A portion of a state separated from the main body by the territory of another state. Example: Kaliningrad (Russia).'},
{topic:'4.3 Political Power and Territoriality',term:'Exclusive Economic Zone',def:'A zone extending 200 nautical miles from a country\'s coast under UNCLOS within which the state holds exclusive rights to exploit natural resources.'},
{topic:'4.9 Challenges to Sovereignty',term:'Failed state',def:'A state that can no longer perform basic governance functions: providing security, public services, or maintaining a monopoly on the legitimate use of force. Examples: Somalia, Yemen.'},
{topic:'4.7 Forms of Governance',term:'Federal state',def:'Power divided between central and regional governments by law. Example: United States, Germany.'},
{topic:'4.4 Defining Political Boundaries',term:'Geometric boundary',def:'A boundary following a mathematical line such as a parallel of latitude or meridian of longitude, with no regard for physical or cultural features.'},
{topic:'4.6 Internal Boundaries',term:'Gerrymandering',def:'Manipulating political district boundaries to favor a particular party or group.'},
{topic:'4.5 The Function of Political Boundaries',term:'Imperialism',def:'The extension of one nation\'s power over other territories through political control, military force, or economic dominance; a key force in drawing the world\'s current political map.'},
{topic:'4.8 Defining Devolutionary Factors',term:'Independence movements',def:'Organized political efforts by a people to achieve self-governance and formal separation from a colonial power or larger state.'},
{topic:'4.1 Introduction to Political Geography',term:'Independent state',def:'A self-governing political territory with internationally recognized borders, a permanent population, and a functioning government exercising sovereignty.'},
{topic:'4.2 Political Processes',term:'Irredentism',def:'Political movement to reclaim territory inhabited by people of the same nation currently under foreign rule.'},
{topic:'4.5 The Function of Political Boundaries',term:'Land boundaries',def:'International borders drawn across terrestrial territory, defined by treaties and marked by physical demarcation on the landscape.'},
{topic:'4.5 The Function of Political Boundaries',term:'Maritime boundaries',def:'Boundaries drawn at sea defining national jurisdiction over territorial waters, exclusive economic zones, and continental shelf rights.'},
{topic:'4.9 Challenges to Sovereignty',term:'Military alliances',def:'Formal agreements between states to provide mutual defense and military cooperation. Examples: NATO, ANZUS, CSTO.'},
{topic:'4.1 Introduction to Political Geography',term:'Multinational state',def:'A state containing two or more nations within its borders. Example: Canada, Russia.'},
{topic:'4.1 Introduction to Political Geography',term:'Multistate nation',def:'A nation whose members are spread across the territory of two or more sovereign states. Example: the Kurdish nation across Turkey, Iraq, Iran, and Syria.'},
{topic:'4.1 Introduction to Political Geography',term:'Nation',def:'A group of people with a shared cultural identity — language, history, ethnicity — and often the desire for their own political unit.'},
{topic:'4.1 Introduction to Political Geography',term:'Nation-state',def:'A state whose political boundaries align with the territory of a nation. Example: Japan, Iceland.'},
{topic:'4.9 Challenges to Sovereignty',term:'NATO',def:'The North Atlantic Treaty Organization; a military alliance of 32 North American and European states committed to collective defense where an attack on one member is an attack on all.'},
{topic:'4.5 The Function of Political Boundaries',term:'Neocolonialism',def:'The continuation of economic and political dominance by wealthy nations over formerly colonized countries through trade agreements and institutional influence without formal political control.'},
{topic:'4.9 Challenges to Sovereignty',term:'OPEC',def:'The Organization of the Petroleum Exporting Countries; a cartel of major oil-producing nations coordinating production levels to influence global oil prices.'},
{topic:'4.6 Internal Boundaries',term:'Redistricting',def:'The process of redrawing electoral district boundaries after a census to reflect population changes; subject to partisan manipulation through gerrymandering.'},
{topic:'4.4 Defining Political Boundaries',term:'Relic boundary',def:'A former boundary no longer functioning politically but still visible in the landscape.'},
{topic:'4.2 Political Processes',term:'Self-determination',def:'The principle under international law that peoples and nations have the right to determine their own political status free from external interference.'},
{topic:'4.8 Defining Devolutionary Factors',term:'Semiautonomous region',def:'A region exercising partial self-governance within a larger state but lacking full independence. Examples: Kurdistan Region of Iraq; Tibet Autonomous Region in China.'},
{topic:'4.3 Political Power and Territoriality',term:'Shatterbelt',def:'A region caught between competing geopolitical interests of stronger external powers, experiencing chronic political instability. Classic example: Eastern Europe during the Cold War.'},
{topic:'4.1 Introduction to Political Geography',term:'Sovereignty',def:'A state\'s supreme authority to govern itself without interference from outside powers.'},
{topic:'4.1 Introduction to Political Geography',term:'State',def:'A politically organized territory with a permanent population, defined boundaries, a functioning government, and recognition by other states.'},
{topic:'4.1 Introduction to Political Geography',term:'Stateless nation',def:'A nation without its own sovereign state. Example: the Kurds.'},
{topic:'4.4 Defining Political Boundaries',term:'Subsequent boundary',def:'A boundary drawn after settlement, often reflecting cultural, ethnic, or linguistic divisions.'},
{topic:'4.4 Defining Political Boundaries',term:'Superimposed boundary',def:'A boundary imposed by an external power, ignoring existing cultural patterns.'},
{topic:'4.9 Challenges to Sovereignty',term:'Supranationalism',def:'An alliance of three or more states that cooperate and cede some sovereignty for mutual benefit. Example: EU, NATO.'},
{topic:'4.3 Political Power and Territoriality',term:'Territorial integrity',def:'The principle that a state\'s borders are inviolable and should not be changed by force.'},
{topic:'4.3 Political Power and Territoriality',term:'Territoriality',def:'The behavior of individuals, groups, or states to define, claim, and defend a geographic territory as an expression of power, identity, and resource control.'},
{topic:'4.9 Challenges to Sovereignty',term:'Terrorism',def:'The deliberate use of violence or threats against civilians to achieve political, ideological, or religious goals; used by state and non-state actors.'},
{topic:'4.9 Challenges to Sovereignty',term:'Trade agreements',def:'International treaties reducing or eliminating tariffs, quotas, and trade barriers between signatory countries to promote free flow of goods and services.'},
{topic:'4.3 Political Power and Territoriality',term:'UNCLOS',def:'The United Nations Convention on the Law of the Sea; establishes the legal framework governing ocean use including territorial waters (12 nm), EEZs (200 nm), and the continental shelf.'},
{topic:'4.7 Forms of Governance',term:'Unitary state',def:'Power concentrated in a central government; less autonomy for regions. Example: France, Japan.'},
{topic:'4.9 Challenges to Sovereignty',term:'United Nations',def:'An intergovernmental organization of 193 member states founded in 1945 to promote international peace and security, human rights, and economic development.'},
{topic:'4.6 Internal Boundaries',term:'Voting districts',def:'Geographic subdivisions used to organize elections and allocate legislative representation; their boundaries can be manipulated through gerrymandering.'}
],
mcqs:[
{topic:'4.1',diff:'medium',stem:'Japan is often cited as a near-perfect nation-state because:',options:['It has the world\'s third largest economy','Its national cultural identity closely corresponds to the borders of its sovereign territory','It practices a federal system with strong regional governments','It was never subject to colonialism'],answer:1,exp:'A nation-state exists where a cultural nation aligns with a sovereign state. Japan\'s highly homogeneous cultural identity within clearly defined island boundaries is a classic example.'},
{topic:'4.4',diff:'medium',stem:'Many borders in sub-Saharan Africa divided ethnic groups and ignored pre-existing cultural patterns. These are:',options:['Antecedent boundaries','Relic boundaries','Superimposed boundaries','Subsequent boundaries'],answer:2,exp:'Superimposed boundaries are imposed by external powers without regard for existing cultural or ethnic patterns — the Berlin Conference of 1884–85 produced Africa\'s colonial borders.'},
{topic:'4.10',diff:'medium',stem:'A national language, flag, and public education system building shared identity in a diverse state is an example of:',options:['Centrifugal force','Devolutionary pressure','Centripetal force','Balkanization'],answer:2,exp:'Centripetal forces unify states. National language, symbols, and education promote cohesion across diverse populations.'},
{topic:'4.8',diff:'medium',stem:'The Scottish Parliament gaining legislative authority from the UK government is best described as:',options:['Supranationalism','Irredentism','Devolution','Balkanization'],answer:2,exp:'Devolution is the transfer of power from central to regional governments. Scotland gaining its own parliament is a textbook example.'},
{topic:'4.9',diff:'medium',stem:'When EU member states follow common trade regulations and environmental standards set by Brussels, they are practicing:',options:['Devolution','Federal governance','Supranationalism','Unitary governance'],answer:2,exp:'Supranationalism involves states voluntarily surrendering some sovereignty to a multinational organization. The EU is the world\'s most integrated supranational organization.'},
{topic:'4.4',diff:'medium',stem:'The US-Canada border along the 49th parallel, drawn before either country had settled the area, is best described as:',options:['A superimposed boundary','A relic boundary','A subsequent boundary','An antecedent boundary'],answer:3,exp:'An antecedent boundary is established before significant settlement occurs. The 49th parallel was negotiated in 1818, before the area was densely populated.'},
{topic:'4.1',diff:'medium',stem:'The Kurds, spread across Turkey, Iraq, Syria, and Iran, are best described as a:',options:['Multinational state','Nation-state','Stateless nation','Federal region'],answer:2,exp:'A stateless nation is a cultural group with shared identity that lacks its own sovereign political territory. The Kurds are one of the world\'s largest stateless nations.'},
{topic:'4.10',diff:'medium',stem:'Ethnic conflict in a multi-ethnic state combined with demands for regional autonomy would best be classified as:',options:['Centripetal forces building national cohesion','Supranationalism in action','Centrifugal forces threatening state unity','Federal decentralization'],answer:2,exp:'Centrifugal forces pull states apart — ethnic conflict and separatist demands destabilize national unity.'},
{topic:'4.6',diff:'medium',stem:'One party redraws district maps to concentrate all opposition voters into just two districts, weakening their influence elsewhere. This is:',options:['Balkanization','Gerrymandering','Irredentism','Devolution'],answer:1,exp:'Gerrymandering manipulates district boundaries for political advantage. Concentrating opposition voters into few districts is the "packing" strategy.'},
{topic:'4.7',diff:'medium',stem:'In a federal state, which best describes the relationship between central and regional governments?',options:['The central government controls all decisions','Regional governments have no independent authority','Power is constitutionally divided between central and regional governments','Regional governments can secede if they choose'],answer:2,exp:'Federalism constitutionally divides power between levels of government — regional governments have guaranteed authority over certain policy areas.'},
{topic:'4.9',diff:'hard',stem:'Brexit (the UK leaving the EU) can be analyzed through multiple political geography concepts. Which combination best explains both the motivations for Brexit and its aftermath?',options:['Devolution and balkanization — the UK devolved power to the EU, then broke apart','Supranationalism (the EU limiting UK sovereignty) and centrifugal forces (English nationalism) driving the decision to leave, followed by new boundary challenges (the Irish border)','Irredentism — the UK sought to reclaim territories lost to the EU','Antecedent boundaries — the EU imposed borders on the UK before it was fully settled'],answer:1,exp:'Brexit illustrates multiple concepts simultaneously: the EU as a supranational body limiting UK sovereignty; English nationalist centrifugal forces driving the leave vote; and post-Brexit, the Irish border became a critical boundary problem. This shows how political geography concepts interact in complex real-world events.'},
{topic:'4.4',diff:'hard',stem:'A river that forms a boundary between two countries changes course over decades due to erosion and flooding. Which type of boundary is most likely to generate a territorial dispute, and why?',options:['Antecedent boundaries — they were drawn before the river existed','Geometric boundaries — straight lines are harder to enforce than natural features','Natural/physical boundaries defined by rivers — when the river moves, the boundary\'s location becomes ambiguous, requiring renegotiation','Superimposed boundaries — they were imposed by external powers who didn\'t understand the river\'s behavior'],answer:2,exp:'When states use physical features (rivers) as boundaries, natural change creates legal ambiguity. The Rio Grande between the US and Mexico has shifted course repeatedly, causing territorial disputes over small parcels of land.'},
{topic:'4.8',diff:'hard',stem:'Spain is a unitary state, yet Catalonia and the Basque Country have their own regional governments, police forces, and tax systems. Which concept best explains this apparent contradiction?',options:['Spain is actually a federal state because regional governments exist','Devolution — Spain\'s central government has transferred significant powers to autonomous communities, creating a "quasi-federal" system without formally changing its unitary structure','Supranationalism — the EU required Spain to give regions more power','Balkanization — Spain is fragmenting into smaller states'],answer:1,exp:'Spain\'s "State of Autonomies" shows that devolution creates a spectrum between purely unitary and purely federal systems. Spain remains formally unitary, but extensive devolution to 17 autonomous communities gives regions significant power.'},
{topic:'4.2',diff:'hard',stem:'Russia\'s 2014 annexation of Crimea and support for Russian-speaking separatists in eastern Ukraine illustrates which combination of political geography concepts?',options:['Devolution and supranationalism','Irredentism (claiming Russian-speaking territory) and the use of ethnic identity as a centrifugal force to destabilize a neighboring state','Gerrymandering and balkanization at the international level','The establishment of an antecedent boundary'],answer:1,exp:'Russia\'s actions combine irredentism (claiming Crimea as home to ethnic Russians) with a strategy of using Russian ethnic minorities as a centrifugal force to weaken Ukrainian state cohesion. This also challenges territorial integrity — a core norm of the post-WWII state system.'},
{topic:'4.10',diff:'hard',stem:'Belgium has Dutch-speaking Flanders in the north, French-speaking Wallonia in the south, and a bilingual capital. Flanders is wealthier; Wallonia has higher unemployment. Which combination of forces most threatens Belgian state cohesion?',options:['Centripetal — the shared monarchy and EU membership unify Belgium','Centrifugal — linguistic division reinforced by economic inequality between regions creates powerful separatist pressure','Irredentist — Flanders wants to join the Netherlands; Wallonia wants to join France','Balkanization has already occurred — Belgium no longer exists as a state'],answer:1,exp:'Belgium exemplifies overlapping centrifugal forces: linguistic division (Dutch/French) reinforced by economic inequality creates a powerful combination. Belgium has had extended periods with no functioning central government, illustrating how centrifugal forces can paralyze even stable democratic states.'},
{topic:'4.1',diff:'hard',stem:'Most states in the modern world are best described as multinational states rather than true nation-states. What does this suggest about the relationship between nations and states?',options:['The nation-state is the ideal form and all states should work toward it','Most political boundaries drawn by historical processes do not align neatly with cultural nations — creating a persistent gap between political and cultural geography','Nations and states are essentially the same concept in modern political geography','The existence of multinational states proves that cultural identity is unimportant in modern politics'],answer:1,exp:'The nation-state is an ideal type — most actual states contain multiple nations, split nations across borders, or have nations that resist state identity. This mismatch between political boundaries and cultural nations is a primary source of ethnic conflict, separatism, and irredentism worldwide.'},
{topic:'4.6',diff:'hard',stem:'After a census, a state legislature redraws congressional districts. One party creates long, thin districts connecting distant like-minded communities to maximize their seat count. Which geographic and political concepts are most directly in tension here?',options:['Formal vs. functional regions — formal districts should reflect functional communities','The geographic concept of gerrymandering vs. the democratic principle that districts should represent compact, contiguous communities — a tension between political advantage and geographic representation','Centripetal vs. centrifugal forces within the district','Supranationalism — federal courts intervening in state redistricting'],answer:1,exp:'Gerrymandering creates a direct tension between political geography (how you draw lines determines who wins) and democratic representation (districts should reflect communities). Extreme gerrymandering creates non-contiguous, oddly shaped districts that don\'t correspond to any meaningful functional or formal region.'},
{topic:'4.9',diff:'hard',stem:'NATO members are bound by Article 5, which states that an attack on one member is an attack on all. A member is attacked, but other members debate whether to invoke Article 5, fearing their own military commitments. This scenario illustrates:',options:['Devolution — members are transferring power back to their national governments','The central tension of supranationalism: states cede sovereignty to gain collective security, but collective security commitments can conflict with individual state interests','Irredentism — the attacked country is claiming territory belonging to the attacking state','Balkanization — the alliance is fragmenting'],answer:1,exp:'This is the core tension of supranationalism: collective organizations require states to act against their immediate individual interests for the benefit of the group. NATO\'s Article 5 works only if members trust others will honor commitments — when that trust erodes, the supranational institution loses effectiveness.'},
{topic:'4.8',diff:'hard',stem:'Scholars note that devolution does not always lead to independence — sometimes it reduces separatist pressure by giving regions enough autonomy to satisfy cultural and political demands. Which concept does this illustrate?',options:['Devolution acts as a centripetal force by giving regions meaningful autonomy, potentially reducing the centrifugal pressure toward outright independence','Devolution always leads to balkanization — giving regions power inevitably encourages them to seek full sovereignty','Supranationalism causes devolution by requiring states to redistribute power downward','Devolution weakens centripetal forces by undermining national institutions'],answer:0,exp:'Devolution can function as a centripetal tool — by addressing legitimate regional grievances through meaningful autonomy, central governments can reduce the appeal of full independence. Scotland\'s 1997 devolution reduced (though didn\'t eliminate) independence pressure for a generation.'},{topic:'4.3',diff:'medium',stem:'Under UNCLOS, a country\'s Exclusive Economic Zone (EEZ) extends how far from its coastline, and what rights does it grant?',options:['12 nautical miles; full sovereignty over all activities including navigation','200 nautical miles; the right to explore and exploit natural resources such as fish and seabed minerals, while allowing other nations freedom of navigation','50 nautical miles; exclusive rights to all military activities and resource extraction','500 nautical miles; complete control over all economic and political activity'],answer:1,exp:'Under UNCLOS, the EEZ extends 200 nautical miles from the coastline. Within this zone, the coastal state has sovereign rights to explore and exploit natural resources but does NOT have full sovereignty — other nations retain freedom of navigation and overflight. The territorial sea (12 nm) is where full sovereignty applies. The EEZ is one of the most important concepts in contemporary political geography as it governs access to offshore fisheries, oil, and gas.'},{topic:'4.3',diff:'medium',stem:'Kaliningrad is a Russian territory on the Baltic Sea completely separated from mainland Russia by Lithuania and Belarus. Which political geography term best describes Kaliningrad?',options:['An enclave — it is completely surrounded by foreign territory','An exclave — it is a portion of Russia separated from the main territory by intervening foreign states','A semiautonomous region — it has self-governing authority independent of Moscow','A shatterbelt — it is caught between competing geopolitical interests'],answer:1,exp:'An exclave is a portion of a state\'s territory that is geographically separated from the main body by the territory of one or more other states. Kaliningrad is a classic exclave — legally part of Russia but physically detached, surrounded by EU/NATO member states. An enclave, by contrast, is territory completely surrounded by a single foreign state (like Lesotho within South Africa). This distinction tests CED Topic 4.3: Political Power and Territoriality.'},{topic:'4.3',diff:'hard',stem:'The Strait of Hormuz carries approximately 20% of the world\'s oil supply. Iran and Oman share sovereignty over this strait. Which combination of political geography concepts best explains its geopolitical significance?',options:['It is significant because it is the site of a superimposed boundary between Iran and Oman','The strait is a choke point — a narrow passage controlling access between larger bodies of water — whose position gives bordering states leverage over global energy supplies and creates a zone where territorial sovereignty, EEZ rights, and freedom of navigation rights intersect and sometimes conflict','The strait is an exclave because Iran has territory on both sides of it','The strait matters only because it marks the boundary between formal and functional regions in Southwest Asia'],answer:1,exp:'Choke points are narrow geographic passages whose control confers disproportionate strategic and economic power. The Strait of Hormuz exemplifies this: roughly 20% of global oil passes through a passage only 21 miles wide at its narrowest. Under UNCLOS, bordering states have sovereignty over the 12 nm territorial sea but cannot legally block innocent passage — creating tension between territorial sovereignty and international freedom of navigation norms. This is a core concept in CED Topic 4.3: Political Power and Territoriality.'},
],
frqs:[
{type:'No Stimulus FRQ',prompt:'A. Define the concept of "sovereignty" as used in political geography.\nB. Explain how supranationalism can challenge a state\'s sovereignty.\nC. Identify ONE specific supranational organization and explain how membership has affected one member state\'s sovereignty.',guide:[{pts:1,text:'A. Sovereignty: a state\'s supreme authority to govern itself without external interference — the foundational principle of the modern state system.'},{pts:2,text:'B. Supranational organizations require member states to cede certain decision-making powers to a collective body. Members may be bound by rules they did not individually choose, limiting their independent action.'},{pts:2,text:'C. Example: European Union — member states adopt the euro (losing control of monetary policy), follow EU environmental and labor regulations, and allow free movement of people across borders. Brexit represents one country\'s response to perceived loss of sovereignty.'}]},
{type:'1-Stimulus FRQ',prompt:'Political geographers study the forces that hold states together and pull them apart.\n\nA. Define centripetal force and provide one specific example.\nB. Define centrifugal force and provide one specific example.\nC. Explain how one centrifugal force has led to devolution in a specific country.',guide:[{pts:1,text:'A. Centripetal force: a unifying force that strengthens state cohesion. Example: a shared national language (e.g., French in France), a strong military, national sports team.'},{pts:1,text:'B. Centrifugal force: a divisive force that weakens state unity. Example: ethnic separatism (e.g., Basque separatism in Spain), religious conflict, economic inequality between regions.'},{pts:2,text:'C. Example: Linguistic and cultural differences (centrifugal) between Catalonia and the Spanish central government have led to demands for independence and the granting of significant regional autonomy (devolution) — including Catalonia\'s own parliament and control over education.'}]},
]},

{id:5,weight:'12–17%',title:'Agriculture & Rural Land Use',desc:'Agricultural origins, Green Revolution, Von Thünen model, agricultural production regions, global agriculture challenges',color:'#0F6E56',bg:'#E1F5EE',
concepts:[
{topic:'5.7 Spatial Organization of Agriculture',term:'Agribusiness',def:'Integration of farming with food processing, distribution, and retail into large corporate systems.'},
{topic:'5.10 Consequences of Agricultural Practices',term:'Agricultural pollution',def:'The introduction of harmful substances from farming activities into the environment, including fertilizer runoff, pesticide contamination, and animal waste, degrading water and soil quality.'},
{topic:'5.3 Agricultural Origins and Diffusions',term:'Agricultural revolutions',def:'The major transformations in human food production: First (Neolithic, ~10,000 BCE) introduced farming; Second Revolution (1700s-1800s, Britain) mechanized agriculture; Green Revolution (mid-20th century) introduced high-yield varieties globally.'},
{topic:'5.11 Challenges of Contemporary Agriculture',term:'Agricultural sustainability',def:'Agricultural practices maintaining long-term productivity without depleting natural resources, degrading the environment, or compromising future food security.'},
{topic:'5.11 Challenges of Contemporary Agriculture',term:'Aquaculture',def:'The controlled farming of fish, shellfish, and aquatic plants in freshwater or saltwater environments; the world\'s fastest-growing food production sector.'},
{topic:'5.8 Von Thunen Model',term:'Bid-rent theory',def:'Land value decreases with distance from the CBD. Farmers near cities grow high-value perishable crops.'},
{topic:'5.10 Consequences of Agricultural Practices',term:'Biodiversity',def:'The variety of plant, animal, and microbial life in an ecosystem; industrial monoculture agriculture significantly reduces biodiversity by replacing diverse native species with single crop varieties.'},
{topic:'5.11 Challenges of Contemporary Agriculture',term:'Biotechnology',def:'The application of technology to living organisms; in agriculture includes GMO development, CRISPR gene editing, and lab-grown meat to increase yields or reduce environmental impact.'},
{topic:'5.1 Introduction to Agriculture',term:'Carrying capacity',def:'The maximum population an environment can sustainably support given available food, water, and resources; central to Malthusian arguments about food security limits.'},
{topic:'5.2 Settlement Patterns and Survey Methods',term:'Clustered settlement',def:'A rural settlement pattern in which farms and homes are grouped together in a village or hamlet, with fields extending outward; common in parts of Europe, Africa, and Asia.'},
{topic:'5.3 Agricultural Origins and Diffusions',term:'Columbian Exchange',def:'The transfer of plants, animals, diseases, and people between the Americas and the Old World after Columbus\'s 1492 voyage; transformed global agriculture by spreading maize, potatoes, tomatoes, and diseases worldwide.'},
{topic:'5.1 Introduction to Agriculture',term:'Commercial agriculture',def:'Large-scale farming for profit; crops and livestock produced for sale in markets.'},
{topic:'5.11 Challenges of Contemporary Agriculture',term:'Community-supported agriculture',def:'A direct producer-consumer relationship in which consumers pay in advance for a share of a farm\'s seasonal harvest, providing farmers with stable income and consumers with local produce.'},
{topic:'5.9 The Global System of Agriculture',term:'Complex commodity chains',def:'The multi-step networks of production, processing, transportation, and retail through which agricultural and industrial goods move from raw material to final consumer across global supply systems.'},
{topic:'5.10 Consequences of Agricultural Practices',term:'Conservation efforts',def:'Strategies and policies to protect natural resources, biodiversity, and ecosystems from degradation, including protected areas, sustainable farming practices, and soil conservation programs.'},
{topic:'5.10 Consequences of Agricultural Practices',term:'Deforestation',def:'The clearing of forests for agriculture, logging, or development; a major driver of biodiversity loss, soil erosion, carbon emissions, and regional climate change.'},
{topic:'5.10 Consequences of Agricultural Practices',term:'Desertification',def:'Fertile land degrading into desert due to drought, overgrazing, deforestation, or poor farming practices.'},
{topic:'5.11 Challenges of Contemporary Agriculture',term:'Dietary shifts',def:'Changes in food consumption patterns associated with rising incomes and urbanization; often involves a shift from plant-based to meat-heavy diets, increasing land and water resource demands.'},
{topic:'5.2 Settlement Patterns and Survey Methods',term:'Dispersed settlement',def:'A rural settlement pattern in which farms and homes are spread individually across the landscape; common in the American Midwest and much of Australia.'},
{topic:'5.10 Consequences of Agricultural Practices',term:'Draining wetlands',def:'The artificial removal of water from wetland ecosystems to convert land for agriculture or development; destroys habitat and eliminates natural flood control and water filtration.'},
{topic:'5.9 The Global System of Agriculture',term:'Export commodities',def:'Agricultural or natural resource products grown or extracted primarily for sale in international markets. Examples: coffee, cacao, soybeans, palm oil, rubber.'},
{topic:'5.6 Agricultural Production Regions',term:'Extensive agriculture',def:'Farming using large land areas with lower inputs per unit.'},
{topic:'5.6 Agricultural Production Regions',term:'Extensive farming',def:'Agricultural production using large land areas with relatively low inputs of labor and capital per unit. Examples: ranching, shifting cultivation, dryland grain farming.'},
{topic:'5.11 Challenges of Contemporary Agriculture',term:'Fair trade',def:'A trading partnership ensuring farmers in developing countries receive equitable prices and better working conditions.'},
{topic:'5.3 Agricultural Origins and Diffusions',term:'Fertile Crescent',def:'The arc of land in Southwest Asia considered a primary hearth of the First Agricultural Revolution, where wheat, barley, sheep, and goats were first domesticated around 10,000 BCE.'},
{topic:'5.10 Consequences of Agricultural Practices',term:'Fertilizer',def:'A natural or synthetic substance applied to soil to supply plant nutrients; overuse causes water pollution through nutrient runoff and algal blooms.'},
{topic:'5.3 Agricultural Origins and Diffusions',term:'First Agricultural Revolution',def:'The Neolithic transition from hunting-gathering to settled farming, beginning ~10,000 BCE.'},
{topic:'5.11 Challenges of Contemporary Agriculture',term:'Food desert',def:'An area with limited access to affordable and nutritious food, often in low-income urban or rural areas.'},
{topic:'5.11 Challenges of Contemporary Agriculture',term:'Food insecurity',def:'The condition of lacking reliable, sufficient access to safe and nutritious food necessary for an active, healthy life; affects over 800 million people globally.'},
{topic:'5.9 The Global System of Agriculture',term:'Global supply chain',def:'The worldwide network of producers, processors, distributors, and retailers involved in bringing a product from raw material to end consumer.'},
{topic:'5.11 Challenges of Contemporary Agriculture',term:'GMO',def:'An organism whose genetic material has been altered to produce desired traits such as drought resistance or higher yield.'},
{topic:'5.5 The Green Revolution',term:'Green Revolution',def:'Mid-20th century introduction of high-yield crop varieties, fertilizers, and irrigation to developing nations.'},
{topic:'5.3 Agricultural Origins and Diffusions',term:'Hearths of domestication',def:'The geographic regions where plants and animals were first independently domesticated: the Fertile Crescent, East Asia, Mesoamerica, and Andean South America.'},
{topic:'5.5 The Green Revolution',term:'High-yield seeds',def:'Genetically improved crop varieties developed during the Green Revolution that produce dramatically higher yields when combined with fertilizers and irrigation.'},
{topic:'5.3 Agricultural Origins and Diffusions',term:'Indus River Valley',def:'An early center of agricultural civilization in present-day Pakistan and northwestern India; an independent hearth of domestication for cotton.'},
{topic:'5.6 Agricultural Production Regions',term:'Intensive agriculture',def:'Farming requiring large labor and/or capital inputs per unit of land.'},
{topic:'5.6 Agricultural Production Regions',term:'Intensive farming',def:'Agricultural production maximizing output from a small area through high inputs of labor, capital, and technology. Examples: greenhouse horticulture, paddy rice, market gardening.'},
{topic:'5.5 The Green Revolution',term:'Irrigation',def:'The artificial application of water to agricultural land; essential in arid regions but can lead to soil salinization and aquifer depletion when poorly managed.'},
{topic:'5.10 Consequences of Agricultural Practices',term:'Land cover change',def:'The transformation of Earth\'s surface from one type such as forest or wetland to another such as cropland or urban area as a result of human activities.'},
{topic:'5.2 Settlement Patterns and Survey Methods',term:'Linear settlement',def:'A rural settlement pattern in which homes and farms are arranged in a line along a road, river, or coastline; characteristic of the French long-lot system in Louisiana and Quebec.'},
{topic:'5.11 Challenges of Contemporary Agriculture',term:'Local food movements',def:'Consumer and producer initiatives to shorten the food supply chain by sourcing food from nearby farms, reducing emissions and supporting local economies.'},
{topic:'5.2 Settlement Patterns and Survey Methods',term:'Long-lot survey system',def:'Land divided into narrow parcels extending back from a road or waterway. Associated with French colonial regions.'},
{topic:'5.6 Agricultural Production Regions',term:'Market gardening',def:'The intensive cultivation of vegetables, fruits, and flowers near urban markets; relies on high inputs of labor and capital to produce perishable crops for local sale.'},
{topic:'5.4 The Second Agricultural Revolution',term:'Mechanized farming',def:'Agriculture using machinery rather than animal or human labor; dramatically increases productivity but reduces farm employment and increases capital requirements.'},
{topic:'5.6 Agricultural Production Regions',term:'Mediterranean climate',def:'A climate characterized by hot, dry summers and mild, wet winters; found around the Mediterranean Sea, California, Chile, and southwestern Australia.'},
{topic:'5.2 Settlement Patterns and Survey Methods',term:'Metes and bounds system',def:'Land described by landmarks and distances. Common in eastern United States.'},
{topic:'5.6 Agricultural Production Regions',term:'Mixed crop/livestock systems',def:'Agricultural systems combining crop cultivation with animal husbandry, often using animal waste as fertilizer and crop residues as animal feed.'},
{topic:'5.3 Agricultural Origins and Diffusions',term:'Neolithic Revolution',def:'The First Agricultural Revolution; the transition from nomadic hunting-gathering to settled farming beginning around 10,000 BCE in multiple independent hearths worldwide.'},
{topic:'5.1 Introduction to Agriculture',term:'Nomadic herding',def:'A subsistence form of pastoral nomadism in which herders and livestock move seasonally across large territories following water and pasture.'},
{topic:'5.11 Challenges of Contemporary Agriculture',term:'Organic farming',def:'Agricultural practices avoiding synthetic fertilizers, pesticides, and GMOs, relying on natural inputs and ecological processes; associated with lower environmental impact.'},
{topic:'5.1 Introduction to Agriculture',term:'Pastoral nomadism',def:'Herders move their animals seasonally to find pasture. Common in arid regions of Africa and Asia.'},
{topic:'5.10 Consequences of Agricultural Practices',term:'Pesticide',def:'A chemical used to kill insects, weeds, or fungi; overuse contaminates water supplies, harms non-target species, and contributes to pest resistance.'},
{topic:'5.6 Agricultural Production Regions',term:'Physical environment',def:'The natural characteristics of a location including climate, soil fertility, topography, and water availability that set fundamental conditions for agricultural land use.'},
{topic:'5.9 The Global System of Agriculture',term:'Plantation agriculture',def:'Large commercial farms specializing in one crop for export, often in tropical regions.'},
{topic:'5.1 Introduction to Agriculture',term:'Ranching',def:'An extensive form of commercial livestock farming focused on raising cattle or sheep over large land areas; typical of semi-arid regions in North and South America and Australia.'},
{topic:'5.7 Spatial Organization of Agriculture',term:'Rural land-use patterns',def:'The spatial arrangements of agricultural and non-agricultural activities across the rural landscape, shaped by physical environment, cultural traditions, and economic conditions.'},
{topic:'5.2 Settlement Patterns and Survey Methods',term:'Rural settlement patterns',def:'The spatial distribution of homes and farms in the countryside; includes clustered, dispersed, and linear arrangements determined by culture, history, and physical geography.'},
{topic:'5.2 Settlement Patterns and Survey Methods',term:'Rural survey methods',def:'The techniques used to divide and document land ownership in rural areas, creating distinct field patterns visible in aerial photography.'},
{topic:'5.4 The Second Agricultural Revolution',term:'Second Agricultural Revolution',def:'Advances in farming technology in Britain (1700s–1800s) that increased yields and freed labor for industrialization.'},
{topic:'5.1 Introduction to Agriculture',term:'Shifting cultivation',def:'Farmers clear and burn forest, farm briefly, then move on when soil is exhausted. Common in tropical regions.'},
{topic:'5.1 Introduction to Agriculture',term:'Slash and burn',def:'A form of shifting cultivation in which farmers clear land by cutting and burning forest vegetation; the ash temporarily fertilizes the soil before it is exhausted and the farmer moves on.'},
{topic:'5.10 Consequences of Agricultural Practices',term:'Soil salinization',def:'Buildup of salt in topsoil from excessive irrigation, rendering land unable to support crops.'},

{topic:'5.2 Settlement Patterns and Survey Methods',term:'Township and range system',def:'U.S. survey system dividing land into 6-mile-square townships, then 36 one-square-mile sections.'},

{topic:'5.11 Challenges of Contemporary Agriculture',term:'Value-added specialty crops',def:'Agricultural products processed or marketed to increase their value beyond the raw commodity price. Examples: artisanal cheese, certified organic produce, craft beer, single-origin coffee.'},
{topic:'5.8 Von Thunen Model',term:'Von Thünen model',def:'Concentric zones of agricultural land use around a market city, determined by transportation costs and perishability.'},
{topic:'5.12 Women in Agriculture',term:'Women in agriculture',def:'Women perform the majority of agricultural labor in sub-Saharan Africa and South Asia yet often lack land rights and credit access.'},

mcqs:[
{topic:'5.8',diff:'medium',stem:'According to the Von Thünen model, which agricultural activity is found in the innermost ring?',options:['Grain farming','Ranching','Dairy farming and market gardening','Timber production'],answer:2,exp:'Perishable, high-value products belong closest to the market — dairy and vegetables require quick delivery and generate revenue to justify expensive land near the city.'},
{topic:'5.5',diff:'medium',stem:'A major criticism of the Green Revolution is that it:',options:['Had no effect on crop yields','Primarily benefited wealthy farmers who could afford inputs, marginalizing small-scale farmers','Was rejected by all developing nations','Reduced global food production overall'],answer:1,exp:'While yields increased dramatically, the Green Revolution\'s expensive inputs were accessible mainly to wealthier farmers — deepening inequality in rural areas.'},
{topic:'5.10',diff:'medium',stem:'Excessive irrigation in arid regions most commonly leads to:',options:['Increased biodiversity','Soil salinization, making land unproductive','Desertification caused by falling rainfall','Increased water table levels'],answer:1,exp:'When irrigation water evaporates in dry climates, it leaves salt deposits. Repeated irrigation causes salt to accumulate until the soil can no longer support crops.'},
{topic:'5.2',diff:'medium',stem:'The long-lot survey system in Louisiana produces which most recognizable landscape characteristic?',options:['Square grid townships of 6 miles on each side','Narrow parcels extending back from waterways, giving many farms river frontage','Irregular boundaries based on local landmarks','Large plantations with no uniform survey method'],answer:1,exp:'The French long-lot system gave each farm a short frontage on a river but extended far back — allowing many farms water transportation access and creating ribbon-like settlement patterns.'},
{topic:'5.1',diff:'medium',stem:'A farmer in Bangladesh who grows enough rice for her family\'s consumption and sells little surplus is practicing:',options:['Commercial agriculture','Intensive plantation farming','Subsistence agriculture','Agribusiness'],answer:2,exp:'Subsistence agriculture is farming primarily to feed the household, with little or no surplus produced for market sale.'},
{topic:'5.9',diff:'medium',stem:'A transnational corporation controlling seed production, fertilizer distribution, food processing, and supermarket sales describes:',options:['Fair trade','The Von Thünen model','Agribusiness','Bid-rent theory'],answer:2,exp:'Agribusiness refers to the vertical integration of agriculture into large corporate systems that control the entire food chain from inputs through retail distribution.'},
{topic:'5.1',diff:'medium',stem:'Which best describes pastoral nomadism?',options:['Growing high-value crops in greenhouses near urban markets','Rotating crops among multiple fields to restore soil nutrients','Moving herds seasonally to find fresh pasture in arid regions','Burning forest to create temporary farmland'],answer:2,exp:'Pastoral nomadism involves herders moving their livestock seasonally to exploit available pasture — common in the Sahel, Central Asia, and the Arabian Peninsula.'},
{topic:'5.10',diff:'medium',stem:'The expansion of the Sahara Desert southward into the Sahel, partly driven by overgrazing and deforestation, is an example of:',options:['Soil salinization','Desertification','Green Revolution consequences','Shifting cultivation'],answer:1,exp:'Desertification is the degradation of dryland ecosystems, driven by drought, overgrazing, deforestation, and inappropriate agriculture. The Sahel is one of the world\'s most acute desertification zones.'},
{topic:'5.3',diff:'medium',stem:'The Fertile Crescent of Southwest Asia is significant because:',options:['It is the site of the world\'s largest commercial farms','It is one of the independent hearths of the First Agricultural Revolution','It first adopted Green Revolution techniques','It is where the township and range system originated'],answer:1,exp:'The Fertile Crescent is one of several independent hearths where agriculture developed around 10,000 BCE, with wheat, barley, sheep, and cattle among the earliest domesticated species.'},
{topic:'5.11',diff:'medium',stem:'A low-income urban neighborhood with no grocery stores and only fast food and convenience stores is best described as:',options:['An area with pastoral nomadism','A food desert','A functional agricultural region','A fair-trade zone'],answer:1,exp:'A food desert is an area with limited access to affordable, nutritious food — typically in low-income communities where full-service grocery stores are absent.'},
{topic:'5.8',diff:'hard',stem:'A dairy farmer 20 miles from a city earns high profits, while a grain farmer at the same distance earns much less per acre. A rancher 100 miles away also earns reasonable profits. Which aspect of the Von Thünen model explains this pattern?',options:['All agricultural zones earn equal profits — transportation cost differences explain the spatial pattern','Dairy farming has high perishability and high revenue per acre; grain is less perishable and less profitable; ranching requires large land areas feasible far from the market where land is cheap','The Von Thünen model predicts grain will always be closer to the city than dairy','Ranching is an intensive use that belongs in the inner ring'],answer:1,exp:'Von Thünen\'s model is fundamentally about the competition between land rent and transportation cost. Dairy\'s high perishability requires proximity; its high revenue per acre justifies expensive land. Grain can travel further but has lower revenue per acre. Ranching uses vast cheap land far from the market.'},
{topic:'5.5',diff:'hard',stem:'India adopted Green Revolution varieties in the 1960s and avoided predicted famines. Yet India still has significant undernourishment. Which explanation best accounts for this paradox?',options:['The Green Revolution was a failure because undernourishment persists','Green Revolution technology increased total food production but did not resolve the underlying issues of food access, distribution inequality, and poverty that cause hunger','India\'s population declined after the Green Revolution, reducing food demand','The Green Revolution only worked in Punjab and had no national effect'],answer:1,exp:'The Green Revolution solved the supply problem (enough calories exist) but not the access problem (poverty, inequality, distribution failures). Most famines result from entitlement failures (people can\'t afford food), not absolute shortages. The Green Revolution addressed supply; it left access and equity unresolved.'},
{topic:'5.10',diff:'hard',stem:'The Aral Sea in Central Asia lost 90% of its volume after Soviet irrigation projects diverted its feeder rivers to grow cotton in desert regions. Which combination of agricultural consequences does this represent?',options:['Only desertification — the surrounding area became desert','Soil salinization (exposed lakebed became a salt flat), desertification of the surrounding region, collapse of the local fishing economy, and regional climate change — illustrating how agricultural decisions cascade into multiple geographic consequences','Only soil salinization — the water became too salty to support crops','Overgrazing and shifting cultivation depleted the land'],answer:1,exp:'The Aral Sea disaster is a case study in compound agricultural consequences. Cotton irrigation depleted the sea; exposed saltpan became a source of toxic dust storms; surrounding farmland became less productive; fishing villages became landlocked; regional climate became more extreme. Single agricultural policy decisions can trigger cascading geographic consequences.'},
{topic:'5.11',diff:'hard',stem:'Critics of GMOs argue they reduce biodiversity by replacing diverse traditional crop varieties with uniform monocultures. Supporters argue GMOs increase yields and reduce pesticide use. Which geographic concept is most central to evaluating these competing claims?',options:['Von Thünen model — GMOs affect which crops are grown at each distance from the market','The spatial and environmental consequences of agricultural practices — both arguments address how farming methods reshape ecosystems and food systems across scales','Bid-rent theory — GMOs make land more valuable near cities','Fair trade — GMO adoption undermines small farmers\' market access'],answer:1,exp:'The GMO debate is fundamentally about the consequences of agricultural practices at multiple scales: local (farm biodiversity), regional (ecosystem effects), and global (food system resilience). Both sides are making geographic arguments about spatial and environmental outcomes.'},
{topic:'5.2',diff:'hard',stem:'A geographer comparing aerial photographs of rural France, rural Louisiana, and the rural U.S. Midwest can identify which survey system was used based on field shape alone. What does this illustrate?',options:['That all agricultural regions use the same survey system','That the cultural landscape — specifically field patterns — preserves evidence of the political and colonial decisions that originally organized land, making survey systems a lasting visible record of historical geography','That township and range is more efficient than long-lot systems','That metes and bounds systems produce more square fields than other systems'],answer:1,exp:'Survey systems create distinctly different field shapes visible from the air: long-lot produces narrow ribbons; township and range produces near-perfect squares; metes and bounds produces irregular polygons. These patterns persist for centuries, making the cultural landscape a living archive of historical land distribution decisions.'},
{topic:'5.9',diff:'hard',stem:'Coffee is grown primarily in tropical developing nations but consumed primarily in wealthy temperate nations. The farmers who grow coffee often receive a small fraction of the retail price. Which geographic framework best explains this price gap?',options:['Von Thünen model — coffee grown far from markets earns less','World-systems theory / dependency — periphery nations export raw agricultural commodities cheaply while core nations add value through processing, branding, and retail, capturing most of the profit','Bid-rent theory — coffee land is undervalued near tropical cities','The Green Revolution — coffee was not included in high-yield variety programs'],answer:1,exp:'Coffee\'s commodity chain illustrates world-systems theory applied to agriculture. Periphery nations supply raw beans; core nations control roasting, branding, retail, and profit. Fair trade certification attempts to disrupt this by ensuring farmers receive a larger share.'},
{topic:'5.12',diff:'hard',stem:'In sub-Saharan Africa, women perform the majority of agricultural labor but rarely own land or control farm income. Which combination of consequences does this gender gap create?',options:['Women\'s lack of land rights has no effect on agricultural productivity','Women\'s lack of land rights reduces agricultural investment and productivity, limits adoption of new techniques, and perpetuates intergenerational poverty','Land ownership only matters for commercial agriculture','Women farmers are inherently less productive than male farmers'],answer:1,exp:'The gender gap in land rights has concrete geographic consequences: women without land titles can\'t access credit or inputs; they\'re less likely to invest in soil improvement; their farms produce less. Research shows that closing the gender gap in agricultural resources could reduce global hunger significantly.'},
{topic:'5.6',diff:'hard',stem:'Plantation agriculture was historically concentrated in tropical colonies producing export crops for temperate industrial core nations. What geographic concept does this spatial pattern most directly reflect?',options:['Von Thünen model — plantations are in the outer rings because they are extensive','The core-periphery model — tropical periphery regions were organized to supply raw agricultural commodities to industrial core nations under colonial economic systems','Bid-rent theory — plantation crops require cheap land far from urban markets','Intensive agriculture principles — plantations maximize output per acre'],answer:1,exp:'Plantation agriculture\'s global pattern is fundamentally a product of the core-periphery relationship under colonialism: tropical colonies were reorganized to produce single export crops for European industrial economies. Many former colonies still specialize in these same export crops today.'},
{topic:'5.8',diff:'hard',stem:'A city builds a new high-speed rail line connecting a rural region 150 miles away to the urban core. According to Von Thünen\'s logic, what would you predict would happen to agricultural land use in that rural region?',options:['No change — Von Thünen\'s model is not affected by transportation improvements','Agricultural land use would shift toward more intensive, perishable crops as transportation costs effectively decrease — the rural region moves "closer" to the market in economic terms','Extensive ranching would move into the region because rail makes large-volume shipping easier','The rural region would immediately convert all land to residential use'],answer:1,exp:'Von Thünen\'s model is fundamentally about transportation cost, not physical distance. Reducing transportation cost (via rail) has the same effect as reducing physical distance — it allows more intensive, perishable agriculture to be competitive farther from the market. This is why transportation infrastructure transforms agricultural geography.'},
],
frqs:[
{type:'No Stimulus FRQ',prompt:'A. Describe the Von Thünen model of agricultural land use.\nB. Explain the economic logic that determines what agricultural activity occurs in the innermost ring of the Von Thünen model.\nC. Explain ONE way in which modern transportation technology has altered the patterns predicted by the original Von Thünen model.',guide:[{pts:2,text:'A. Von Thünen model: concentric rings of agricultural activity around a central market city, organized by transportation cost and land value. Inner rings: dairy and market gardening; middle: timber, then grain; outer rings: ranching/extensive grazing.'},{pts:1,text:'B. Inner ring logic: perishable goods (dairy, vegetables) must reach market quickly before spoiling. High transportation costs for perishables mean farmers pay premium prices for land close to the market to minimize haul time.'},{pts:2,text:'C. Refrigeration, trucks, and air freight allow perishables to travel long distances without spoiling — collapsing the Von Thünen rings. California exports lettuce nationwide; New Zealand exports dairy to Europe. The model\'s sharp concentric zones are blurred by modern logistics.'}]},
{type:'2-Stimulus FRQ',prompt:'The Green Revolution of the mid-20th century significantly changed global agricultural production.\n\nA. Define the Green Revolution.\nB. Explain ONE positive effect of the Green Revolution on food production.\nC. Explain ONE negative social or environmental consequence of the Green Revolution.',guide:[{pts:1,text:'A. Green Revolution: the transfer of high-yield crop varieties (HYVs), synthetic fertilizers, pesticides, and irrigation techniques to developing countries (1940s–1970s), dramatically increasing food production.'},{pts:1,text:'B. Positive effect: prevented widespread famine by dramatically increasing wheat, rice, and corn yields in South and Southeast Asia and Latin America. India went from food scarcity to food exporter in one generation.'},{pts:2,text:'C. Negative consequence: Increased inequality — only wealthy farmers could afford inputs. Small farmers were often displaced. Environmental: heavy fertilizer and pesticide use caused water pollution, soil degradation, and loss of biodiversity as traditional crop varieties were replaced by monocultures.'}]},
]},

{id:6,weight:'12–17%',title:'Cities & Urban Land Use',desc:'Urbanization, urban models, global cities, density and land use, urban sustainability, urban challenges',color:'#534AB7',bg:'#EEEDFE',
concepts:[
{topic:'6.10 Challenges of Urban Changes',term:'Affordability',def:'The degree to which housing costs are manageable relative to residents\' incomes; declining affordability is a primary challenge in global cities and gentrifying neighborhoods.'},
{topic:'6.5 The Internal Structure of Cities',term:'African City Model',def:'A model of urban structure in sub-Saharan African cities showing a colonial CBD, a traditional marketplace, ethnic neighborhoods, and rapidly growing informal settlements on the urban periphery.'},
{topic:'6.8 Urban Sustainability',term:'Air quality',def:'A measure of the purity of the air; urban areas often suffer poor air quality from vehicle emissions and industrial pollution, creating serious public health challenges.'},
{topic:'6.10 Challenges of Urban Changes',term:'Blockbusting',def:'Former real estate practice of encouraging white homeowners to sell cheaply by warning that minorities were moving in.'},
{topic:'6.1 The Origin and Influences of Urbanization',term:'Boomburbs',def:'Fast-growing suburban cities with populations exceeding 100,000 that maintain a suburban character despite their size. Most common in the American Sun Belt. Examples: Mesa AZ, Henderson NV.'},
{topic:'6.10 Challenges of Urban Changes',term:'Brownfields',def:'Previously developed industrial or commercial urban land that is abandoned or underused, often due to actual or suspected contamination; priority targets for urban redevelopment.'},
{topic:'6.5 The Internal Structure of Cities',term:'Central Business District (CBD)',def:'The commercial and business core of a city, characterized by high land values and concentrated economic activity.'},
{topic:'6.4 The Size and Distribution of Cities',term:'Central place theory',def:'Christaller\'s model explaining city size and spacing based on market areas, threshold, and range.'},
{topic:'6.4 The Size and Distribution of Cities',term:'Christaller\'s Central Place Theory',def:'A geographic model explaining the size, number, and distribution of settlements based on threshold (minimum population to support a service) and range (maximum travel distance).'},
{topic:'6.7 Infrastructure',term:'City government',def:'The local governing body of a municipality, responsible for public services including water, sanitation, roads, zoning, and public safety within city boundaries.'},
{topic:'6.7 Infrastructure',term:'City infrastructure',def:'The foundational physical systems enabling urban life: roads, water and sewer networks, power grids, public transit, and communications systems.'},
{topic:'6.11 Challenges of Urban Sustainability',term:'Climate change',def:'Long-term shifts in global temperatures and precipitation driven by greenhouse gas emissions; cities are major contributors and highly vulnerable to flooding and heat extremes.'},
{topic:'6.5 The Internal Structure of Cities',term:'Concentric zone model',def:'Burgess (1925): cities grow outward in concentric rings from CBD outward to commuter zone.'},
{topic:'6.7 Infrastructure',term:'County government',def:'A level of local governance serving areas beyond individual city limits, including unincorporated areas; provides courts, roads, and health services in the US.'},
{topic:'6.10 Challenges of Urban Changes',term:'De facto segregation',def:'Racial or socioeconomic separation occurring in practice through housing costs, school boundaries, or social patterns without being formally mandated by law.'},
{topic:'6.6 Density and Land Use',term:'Decentralization',def:'The dispersion of population, employment, and economic activity from city centers to suburbs and edge cities, driven by automobiles, highways, and affordable suburban land.'},
{topic:'6.5 The Internal Structure of Cities',term:'Disamenity zones',def:'Areas within cities that are highly undesirable for habitation due to environmental hazards, extreme poverty, crime, or proximity to polluting industries; often home to informal settlements.'},
{topic:'6.11 Challenges of Urban Sustainability',term:'Ecological footprint',def:'The total land area and natural resources required to sustain a person\'s or city\'s consumption and absorb its waste; cities have ecological footprints far larger than their physical boundaries.'},
{topic:'6.5 The Internal Structure of Cities',term:'Edge city',def:'A large node of office, retail, and entertainment outside a traditional urban core, accessible mainly by car.'},
{topic:'6.6 Density and Land Use',term:'Exurbs',def:'Low-density communities beyond the outer suburbs, connected to the metropolitan economy but surrounded by rural land; growth driven by remote work and improved transportation.'},
{topic:'6.11 Challenges of Urban Sustainability',term:'Farmland protection policies',def:'Government measures designed to prevent conversion of productive farmland to urban development, including agricultural zoning and conservation easements.'},
{topic:'6.9 Urban Data',term:'Field studies',def:'On-the-ground geographic research involving direct observation, mapping, photography, and interviews to gather first-hand data about urban conditions.'},
{topic:'6.7 Infrastructure',term:'Functional fragmentation of government',def:'The division of metropolitan governance among many specialized single-purpose agencies making coordinated regional planning difficult.'},
{topic:'6.5 The Internal Structure of Cities',term:'Galactic/peripheral city model',def:'Harris (1997): suburban development around a legacy city center, with edge cities connected by beltways.'},
{topic:'6.10 Challenges of Urban Changes',term:'Gentrification',def:'Wealthier residents move into lower-income urban areas — raising property values, often displacing existing residents.'},
{topic:'6.7 Infrastructure',term:'Geographic fragmentation of government',def:'The division of a metropolitan area among many separate municipal governments, each with independent taxing authority, creating service inequities and obstacles to regional planning.'},
